<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>NoMad Split</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    html, body { height: 100%; overflow: hidden; }
    .scroll-container { height: 100%; overflow-y: auto; padding-bottom: 90px; }
    .btn-hidden { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans relative">

  <div id="registrationModal" class="absolute inset-0 z-[100] bg-gray-900 bg-opacity-95 flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center space-y-4">
      <div class="text-4xl">👋</div>
      <h2 class="text-xl font-bold text-gray-800">歡迎加入旅程</h2>
      <p class="text-sm text-gray-500">系統偵測到您是初次使用，請設定您在記帳本中顯示的真實姓名（限 6 個字以內）。</p>
      <input type="text" id="realNameInput" maxlength="6" placeholder="請輸入姓名" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button id="registerBtn" onclick="submitRegistration()" class="w-full bg-blue-600 text-white font-bold rounded-xl py-3 active:bg-blue-700">完成註冊並進入</button>
    </div>
  </div>

  <div class="scroll-container" id="scrollArea">
    <div class="bg-white shadow-sm p-4 sticky top-0 z-10 flex items-center space-x-2">
      <h1 class="text-lg font-bold text-gray-800" id="tripNameDisplay">系統連線中...</h1>
      <div id="statusLight" class="w-3 h-3 rounded-full bg-yellow-400 animate-pulse shadow-sm"></div>
    </div>

    <div class="p-4 space-y-4" id="mainForm" style="display: none;">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">消費項目</label>
        <input type="text" id="descInput" placeholder="" class="w-full bg-white border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div class="flex space-x-3">
        <div class="w-1/3">
          <label class="block text-sm font-medium text-gray-600 mb-1">幣別 <span id="rateDisplay" class="text-[10px] text-blue-500 ml-1 font-bold"></span></label>
          <select id="currencySelect" class="live-trigger w-full bg-white border border-gray-200 rounded-lg p-3 focus:outline-none border-gray-200 text-gray-700 font-bold">
            <option value="KRW">KRW</option>
            <option value="JPY">JPY</option>
            <option value="VND">VND</option>
            <option value="TWD">TWD</option>
          </select>
        </div>
        <div class="w-2/3">
          <label class="block text-sm font-medium text-gray-600 mb-1">總金額</label>
          <input type="text" id="amountInput" inputmode="decimal" placeholder="0" class="live-trigger w-full text-xl font-bold text-blue-600 bg-white border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400 text-right">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">分帳模式</label>
        <select id="splitModeSelect" class="live-trigger w-full bg-white border border-gray-200 rounded-lg p-3 focus:outline-none border-gray-200">
          <option value="EQUAL">👥 平均分攤</option>
          <option value="EXACT">🎯 拆分金額</option>
          <option value="SHARE">⚖️ 人頭份數</option>
          <option value="PERCENT">📈 比例分配</option>
        </select>
      </div>

      <div class="bg-white border border-gray-100 rounded-xl shadow-sm overflow-hidden">
        <div class="bg-blue-50/50 p-3 flex justify-between items-center border-b border-gray-100">
          <span class="text-sm font-bold text-gray-700">分帳明細</span>
          <span id="balanceStatus" class="text-xs font-bold text-gray-400">請輸入總金額</span>
        </div>
        <div id="splitDetailContainer" class="p-3 space-y-3 max-h-60 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <div id="bottomBar" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-50">
    <button id="submitBtn" onclick="submitExpense()" disabled class="w-full bg-gray-300 text-white font-bold text-lg rounded-xl py-3 shadow-sm transition-colors duration-200">
      🔒 請先輸入有效金額
    </button>
  </div>

  <script>
    const MY_LIFF_ID = "2010297900-38V2U0d0";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_KjMuAXfyZcRcjIJAGDrsxsg8n1KA7ROv_NeiGtzuOtjnvHMEIxAtTzMmCFECwVY/exec";
    
    let currentTripId = null, currentUserProfile = null, currentGroupId = null;
    const RATE_MATRIX = { "TWD": 1.0, "KRW": 0.024, "JPY": 0.22, "VND": 0.0013 };
    let MEMBER_LIST = []; 
    let GLOBAL_FEE_RATE = 0;
    let CURRENT_RATE = 1.0; 

    const bottomBar = document.getElementById('bottomBar');
    document.addEventListener('focusin', (e) => { if (e.target.tagName === 'INPUT') bottomBar.classList.add('btn-hidden'); });
    document.addEventListener('focusout', (e) => {
      setTimeout(() => { if(document.activeElement.tagName !== 'INPUT') bottomBar.classList.remove('btn-hidden'); }, 100);
    });

    document.getElementById('mainForm').addEventListener('input', function(e) {
      if (e.target.classList.contains('live-trigger') || e.target.classList.contains('split-input') || e.target.classList.contains('split-checkbox')) {
        if (e.target.id === 'splitModeSelect' || e.target.id === 'currencySelect') renderSplitDetail();
        calculateLivePreview();
      }
    });

    // 幣別變更時連動更新 UI 匯率標示 (直覺格式)
    document.getElementById('currencySelect').addEventListener('change', function(e) {
      CURRENT_RATE = RATE_MATRIX[e.target.value] || 1.0;
      document.getElementById('rateDisplay').innerText = `(1 ${e.target.value} = ${CURRENT_RATE} TWD)`;
      renderSplitDetail();
      calculateLivePreview();
    });

    function renderSplitDetail() {
      const mode = document.getElementById('splitModeSelect').value;
      const currency = document.getElementById('currencySelect').value;
      const container = document.getElementById('splitDetailContainer');
      container.innerHTML = "";
      if (MEMBER_LIST.length === 0) return;

      MEMBER_LIST.forEach(name => {
        const row = document.createElement('div');
        row.className = "flex items-center justify-between bg-white border border-gray-50 p-2 rounded";
        let inputHtml = "";
        
        if (mode === "EQUAL") {
          inputHtml = `<div class="flex items-center space-x-3"><span class="live-result text-xs font-bold text-blue-500 w-16 text-right"></span><input type="checkbox" data-name="${name}" class="split-checkbox w-5 h-5 text-blue-600 rounded border-gray-300" checked></div>`;
        } 
        else if (mode === "EXACT") {
          inputHtml = `<div class="flex items-center"><input type="text" data-name="${name}" inputmode="decimal" placeholder="0" class="split-input live-trigger w-20 text-right bg-gray-50 border border-gray-200 rounded p-1 text-sm focus:outline-none"><span class="text-xs text-gray-500 ml-1 w-8">${currency}</span></div>`;
        } 
        else if (mode === "SHARE") {
          inputHtml = `<div class="flex items-center space-x-2"><span class="live-result text-xs font-bold text-blue-500 w-16 text-right"></span><div class="flex items-center"><input type="text" data-name="${name}" inputmode="decimal" value="1" class="split-input live-trigger w-12 text-center bg-gray-50 border border-gray-200 rounded p-1 text-sm focus:outline-none"><span class="text-xs text-gray-400 ml-1">份</span></div></div>`;
        } 
        else if (mode === "PERCENT") {
          inputHtml = `<div class="flex items-center space-x-2"><span class="live-result text-xs font-bold text-blue-500 w-16 text-right"></span><div class="flex items-center"><input type="text" data-name="${name}" inputmode="decimal" placeholder="0" class="split-input live-trigger w-12 text-right bg-gray-50 border border-gray-200 rounded p-1 text-sm focus:outline-none"><span class="text-xs text-gray-400 ml-1">%</span></div></div>`;
        }
        row.innerHTML = `<span class="text-sm font-medium text-gray-700">${name}</span>${inputHtml}`;
        container.appendChild(row);
      });
    }

    function calculateLivePreview() {
      const rawAmount = parseFloat(document.getElementById('amountInput').value) || 0;
      const currency = document.getElementById('currencySelect').value;
      const mode = document.getElementById('splitModeSelect').value;
      const btn = document.getElementById('submitBtn');
      const statusBar = document.getElementById('balanceStatus');
      const rows = document.getElementById('splitDetailContainer').children;

      btn.disabled = true;
      btn.className = "w-full bg-gray-300 text-white font-bold text-lg rounded-xl py-3 shadow-sm transition-colors duration-200";
      
      if (rawAmount <= 0) {
        statusBar.innerHTML = `<span class="text-gray-400">請輸入總金額</span>`;
        btn.innerText = "🔒 請先輸入有效金額";
        Array.from(rows).forEach(row => { const res = row.querySelector('.live-result'); if(res) res.innerText = ""; });
        return;
      }

      if (mode === "EQUAL") {
        const checked = document.querySelectorAll('.split-checkbox:checked');
        if (checked.length === 0) {
          statusBar.innerHTML = `<span class="text-red-500">❌ 至少需一人</span>`;
          btn.innerText = "🔒 需選擇分帳對象";
          return;
        }
        let base = Math.floor(rawAmount / checked.length);
        let residue = rawAmount - (base * checked.length);
        
        let cIdx = 0;
        Array.from(rows).forEach(row => {
          const cb = row.querySelector('.split-checkbox');
          const res = row.querySelector('.live-result');
          if (cb && cb.checked) {
             let val = base + (cIdx === checked.length - 1 ? residue : 0);
             res.innerText = `${val} ${currency}`;
             cIdx++;
          } else if (res) {
             res.innerText = "-";
          }
        });
        statusBar.innerHTML = `<span class="text-green-600">✅ 自動均分完成</span>`;
        btn.disabled = false; btn.innerText = "💾 儲存並同步至群組"; btn.classList.replace('bg-gray-300', 'bg-blue-600');
      } 
      else if (mode === "EXACT") {
        let currentForeignSum = 0;
        document.querySelectorAll('.split-input').forEach(input => currentForeignSum += (parseFloat(input.value) || 0));
        let diff = rawAmount - currentForeignSum;
        
        if (Math.abs(diff) < 0.1) {
          statusBar.innerHTML = `<span class="text-green-600">✅ 帳目平衡</span>`;
          btn.disabled = false; btn.innerText = "💾 儲存並同步至群組"; btn.classList.replace('bg-gray-300', 'bg-blue-600');
        } else if (diff > 0) {
          statusBar.innerHTML = `<span class="text-red-500">❌ 尚差 ${diff.toFixed(0)} ${currency}</span>`;
          btn.innerText = `🔒 尚差 ${diff.toFixed(0)} ${currency}`;
        } else {
          statusBar.innerHTML = `<span class="text-red-500">❌ 超出 ${Math.abs(diff).toFixed(0)} ${currency}</span>`;
          btn.innerText = `🔒 金額超出`;
        }
      }
      else if (mode === "SHARE" || mode === "PERCENT") {
        let totalMetric = 0;
        document.querySelectorAll('.split-input').forEach(input => totalMetric += (parseFloat(input.value) || 0));
        
        if (mode === "SHARE" && totalMetric <= 0) {
           statusBar.innerHTML = `<span class="text-red-500">❌ 總份數為 0</span>`;
           return;
        }
        if (mode === "PERCENT" && Math.abs(totalMetric - 100) > 0.01) {
           statusBar.innerHTML = `<span class="text-red-500">❌ 總計 ${totalMetric}%</span>`;
           btn.innerText = `🔒 比例須等於 100%`;
           return;
        }

        let calculatedSum = 0;
        let inputs = document.querySelectorAll('.split-input');
        inputs.forEach((input, idx) => {
           let val = parseFloat(input.value) || 0;
           let assigned = Math.floor(rawAmount * (val / totalMetric));
           calculatedSum += assigned;
           if (idx === inputs.length - 1) assigned += (rawAmount - calculatedSum);
           const res = input.closest('div.flex.items-center.justify-between').querySelector('.live-result');
           if(res) res.innerText = `${assigned} ${currency}`;
        });

        statusBar.innerHTML = `<span class="text-green-600">✅ 換算完成</span>`;
        btn.disabled = false; btn.innerText = "💾 儲存並同步至群組"; btn.classList.replace('bg-gray-300', 'bg-blue-600');
      }
    }

    async function submitRegistration() {
      const nameInput = document.getElementById('realNameInput').value.trim();
      const btn = document.getElementById('registerBtn');
      if (!nameInput) return alert("姓名不可為空");
      btn.disabled = true; btn.innerText = "⏳ 註冊中...";
      try {
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: "registerUser", tripId: currentTripId, userId: currentUserProfile.userId, realName: nameInput }) });
        const result = await res.json();
        if (result.status === "success") window.location.reload();
        else throw new Error();
      } catch (e) {
        alert("註冊失敗，請重試"); btn.disabled = false; btn.innerText = "完成註冊並進入";
      }
    }

    async function initializeLiff() {
      const statusLight = document.getElementById('statusLight');
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) return liff.login();

        const urlParams = new URLSearchParams(window.location.search);
        currentTripId = urlParams.get('tripId');
        currentGroupId = liff.getContext().groupId || "ONLINE_TEST";
        currentUserProfile = await liff.getProfile();

        if (!currentTripId) throw new Error("查無旅程變數 ID。");

        const payload = { action: "initWeb", tripId: currentTripId, groupId: currentGroupId, userId: currentUserProfile.userId };
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();

        if (result.status === "success") {
          if (!result.isRegistered) { document.getElementById('registrationModal').classList.remove('hidden'); return; }
          RATE_MATRIX[result.currency] = result.rate;
          GLOBAL_FEE_RATE = result.feeRate || 0;
          CURRENT_RATE = result.rate || 1.0;
          
          document.getElementById('currencySelect').value = result.currency;
          // 初始化時顯示直覺匯率格式
          document.getElementById('rateDisplay').innerText = `(1 ${result.currency} = ${CURRENT_RATE} TWD)`;
          document.getElementById('tripNameDisplay').innerText = `📍目前帳本 [${result.tripName}]`;
          MEMBER_LIST = result.members || [];
          
          statusLight.classList.replace('bg-yellow-400', 'bg-green-500');
          statusLight.classList.remove('animate-pulse');
          
          renderSplitDetail(); document.getElementById('mainForm').style.display = 'block';
        } else throw new Error("後端拒絕連線");
      } catch (err) {
        statusLight.classList.replace('bg-yellow-400', 'bg-red-500');
        statusLight.classList.remove('animate-pulse');
        alert("❌ 系統阻斷：" + err.message);
      }
    }

    async function submitExpense() {
      const btn = document.getElementById('submitBtn');
      const desc = document.getElementById('descInput').value.trim();
      const rawAmount = parseFloat(document.getElementById('amountInput').value);
      const currency = document.getElementById('currencySelect').value;
      const splitMode = document.getElementById('splitModeSelect').value;

      const totalTwd = Math.round(rawAmount * CURRENT_RATE * (1 + GLOBAL_FEE_RATE));
      let splitDetailObj = {};
      
      if (splitMode === "EQUAL") {
        const checkboxes = document.querySelectorAll('.split-checkbox:checked');
        let base = Math.floor(totalTwd / checkboxes.length);
        let residue = totalTwd - (base * checkboxes.length);
        checkboxes.forEach((cb, idx) => {
          let name = cb.getAttribute('data-name');
          splitDetailObj[name] = base + (idx === checkboxes.length - 1 ? residue : 0);
        });
      } 
      else if (splitMode === "EXACT") {
        const inputs = document.querySelectorAll('.split-input');
        inputs.forEach(input => {
          let val = parseFloat(input.value) || 0;
          let name = input.getAttribute('data-name');
          splitDetailObj[name] = Math.round(val * CURRENT_RATE * (1 + GLOBAL_FEE_RATE));
        });
        let calculatedTwdSum = Object.values(splitDetailObj).reduce((a, b) => a + b, 0);
        let residue = totalTwd - calculatedTwdSum;
        const lastPerson = Array.from(inputs).pop().getAttribute('data-name');
        if(residue !== 0) splitDetailObj[lastPerson] += residue;
      } 
      else if (splitMode === "SHARE" || splitMode === "PERCENT") {
        const inputs = document.querySelectorAll('.split-input');
        let totalMetric = 0, metricMap = {};
        inputs.forEach(input => {
          let val = parseFloat(input.value) || 0;
          let name = input.getAttribute('data-name');
          metricMap[name] = val; totalMetric += val;
        });
        let calculatedSum = 0;
        MEMBER_LIST.forEach(name => {
          splitDetailObj[name] = Math.round(totalTwd * (metricMap[name] / totalMetric));
          calculatedSum += splitDetailObj[name];
        });
        let residue = totalTwd - calculatedSum;
        if(residue !== 0 && MEMBER_LIST.length > 0) splitDetailObj[MEMBER_LIST[MEMBER_LIST.length - 1]] += residue;
      }

      btn.disabled = true; btn.innerText = "⏳ 寫入雲端矩陣中...";
      const payload = {
        action: "addExpense", tripId: currentTripId, groupId: currentGroupId,
        payerUserId: currentUserProfile.userId, description: desc,
        rawAmount: rawAmount, currency: currency, exchangeRate: CURRENT_RATE,
        splitMode: splitMode, splitDetailString: JSON.stringify(splitDetailObj) 
      };

      try {
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "success") {
          await liff.sendMessages([{ type: 'text', text: `📝 記帳成功：${desc} $${rawAmount} ${currency}` }]);
          liff.closeWindow();
        } else throw new Error();
      } catch (err) {
        alert("網路通訊錯誤，請重試。"); btn.disabled = false; btn.innerText = "💾 儲存並同步至群組";
      }
    }

    initializeLiff();
  </script>
</body>
</html>
