<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>NoMad Split</title>
  <meta property="og:title" content="NoMad Split">
  <meta property="og:description" content="Stay NoMad. Split the bill.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    html, body { height: 100%; overflow: hidden; background-color: #f9fafb; }
    .app-container { height: calc(100% - 76px); display: flex; flex-direction: column; }
    .btn-hidden { display: none !important; }
    .filter-btn { transition: all 0.15s; }
    .filter-btn.active { background-color: #F0FDFA; color: #0F766E; font-weight: 700; box-shadow: inset 0 0 0 1px #99F6E4; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .chip-btn { padding: 4px 12px; border-radius: 9999px; border: 1px solid #E5E7EB; background: #fff; font-size: 11px; font-weight: 600; color: #6B7280; transition: all 0.15s; }
    .chip-btn.selected { background: #F0FDFA; border-color: #14B8A6; color: #0F766E; }
    .chip-btn.default { background: #0D9488; border-color: #0F766E; color: #fff; } 
    .modal-overlay { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(2px); }
    .toast-enter { transform: translateY(-100%); opacity: 0; }
    .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .toast-exit { transform: translateY(-20%); opacity: 0; transition: all 0.2s ease-in; }
    .split-mode-btn { height:40px; background:#F9FAFB; border:1px solid #E5E7EB; border-radius:10px; font-size:12px; font-weight:600; color:#6B7280; transition:all .15s; }
    .split-mode-btn.active { background:#F0FDFA; border-color:#14B8A6; color:#0F766E;}
    .split-mode-btn:active { transform:scale(.97);}
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="text-gray-800 font-sans relative">

  <div id="toastContainer" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[200] flex flex-col space-y-2 w-[90%] max-w-sm pointer-events-none"></div>

  <div id="errorModal" class="absolute inset-0 z-[150] bg-gray-900 bg-opacity-95 flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center space-y-4">
      <div class="text-4xl">🛑</div>
      <h2 class="text-xl font-bold text-gray-800" id="errorModalTitle">存取遭拒</h2>
      <p class="text-sm text-gray-500" id="errorModalDesc">您沒有權限存取此頁面。</p>
      <button onclick="liff.closeWindow()" class="w-full bg-gray-200 text-gray-700 font-bold rounded-xl py-3 active:bg-gray-300">關閉</button>
    </div>
  </div>

  <div id="registrationModal" class="absolute inset-0 z-[100] bg-gray-900 bg-opacity-95 flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center space-y-4">
      <div class="text-4xl">👋</div>
      <h2 class="text-xl font-bold text-gray-800">歡迎加入旅程</h2>
      <p class="text-sm text-gray-500">請認領管理員預建帳號，或建立新帳號。</p>
      <select id="claimTargetSelect" class="w-full bg-gray-50 border border-gray-100 rounded-lg p-3 text-center text-lg mb-2 hidden">
         <option value="">🌟 建立新帳號</option>
      </select>
      <input type="text" id="realNameInput" maxlength="5" placeholder="請輸入暱稱" class="w-full bg-gray-50 border border-gray-100 rounded-lg p-3 text-center text-lg focus:outline-none focus:ring-2 focus:ring-teal-500 shadow-inner">
      <button id="registerBtn" onclick="submitRegistration()" class="w-full bg-teal-600 text-white font-bold rounded-xl py-3 active:bg-teal-700 shadow-md transition-transform active:scale-[0.98]">完成註冊並進入</button>
    </div>
  </div>

  <div id="manualMemberModal" class="absolute inset-0 z-[120] modal-overlay flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center space-y-4">
      <div class="text-4xl">🧸</div>
      <h2 class="text-xl font-bold text-gray-800">新增手動旅伴</h2>
      <p class="text-sm text-gray-500">請輸入旅伴暱稱 (勿與現有成員重名)</p>
      <input type="text" id="manualNameInput" maxlength="5" placeholder="請輸入暱稱" class="w-full bg-gray-50 border border-gray-100 rounded-lg p-3 text-center text-lg focus:outline-none focus:ring-2 focus:ring-teal-500 shadow-inner">
      <div class="flex space-x-3 pt-2">
        <button onclick="closeManualModal()" class="w-1/2 bg-gray-100 text-gray-700 font-bold rounded-xl py-2.5 active:bg-gray-200 transition-colors">取消</button>
        <button onclick="submitManualMember()" class="w-1/2 bg-teal-600 text-white font-bold rounded-xl py-2.5 shadow-md active:bg-teal-700 transition-transform active:scale-[0.98]">確定新增</button>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="absolute inset-0 z-[110] modal-overlay flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl space-y-4 transform transition-all">
      <h3 class="text-lg font-bold text-rose-600 flex items-center">⚠️ 確認撤銷帳目？</h3>
      <p class="text-sm text-gray-600 font-mono tabular-nums tracking-tight whitespace-pre-line" id="deleteTargetDesc"></p>
      <div class="flex space-x-3 pt-2">
        <button onclick="closeDeleteModal()" class="w-1/2 bg-gray-100 text-gray-700 font-bold rounded-xl py-2.5 active:bg-gray-200 transition-colors">取消</button>
        <button id="confirmDeleteBtn" onclick="executeDelete()" class="w-1/2 bg-rose-500 text-white font-bold rounded-xl py-2.5 shadow-md active:bg-rose-600 transition-transform active:scale-[0.98]">確定撤銷</button>
      </div>
    </div>
  </div>

  <div id="archiveModal" class="absolute inset-0 z-[110] modal-overlay flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl space-y-4 transform transition-all">
      <h3 class="text-lg font-bold text-teal-600 flex items-center">📦 確定要結團封存嗎？</h3>
      <p class="text-sm text-gray-600 leading-relaxed">執行後，帳本將轉為<span class="font-bold text-rose-500">唯讀模式</span>，不再允許新增或撤銷帳目，並結算最終明細。</p>
      <div class="flex space-x-3 pt-2">
        <button onclick="closeArchiveModal()" class="w-1/2 bg-gray-100 text-gray-700 font-bold rounded-xl py-2.5 active:bg-gray-200 transition-colors">再等等</button>
        <button id="confirmArchiveBtn" onclick="archiveTrip()" class="w-1/2 bg-teal-600 text-white font-bold rounded-xl py-2.5 shadow-md active:bg-teal-700 transition-transform active:scale-[0.98]">確定結團</button>
      </div>
    </div>
  </div>

  <div id="evictModal" class="absolute inset-0 z-[110] modal-overlay flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl space-y-4 transform transition-all">
      <h3 class="text-lg font-bold text-rose-600 flex items-center">⚠️ 移除團員</h3>
      <p class="text-sm text-gray-600 leading-relaxed">您確定要將 <span id="evictTargetName" class="font-bold text-rose-600"></span> 從此帳本中移除嗎？</p>
      <div class="flex space-x-3 pt-2">
        <button onclick="closeEvictModal()" class="w-1/2 bg-gray-100 text-gray-700 font-bold rounded-xl py-2.5 active:bg-gray-200 transition-colors">取消</button>
        <button id="confirmEvictBtn" onclick="executeRemoveMember()" class="w-1/2 bg-rose-500 text-white font-bold rounded-xl py-2.5 shadow-md active:bg-rose-600 transition-transform active:scale-[0.98]">確定移除</button>
      </div>
    </div>
  </div>

  <div id="summaryModal" class="absolute inset-0 z-[110] modal-overlay flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl space-y-3 transform transition-all flex flex-col max-h-[80vh]">
      <div class="flex justify-between items-center border-b border-gray-100 pb-2 flex-shrink-0">
        <h3 class="text-lg font-bold text-teal-600 flex items-center">🪧 目前結算</h3>
        <button onclick="closeSummaryModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold leading-none px-2 active:scale-90">時間戳:&times;</button>
      </div>
      <div class="overflow-y-auto flex-grow text-sm text-gray-700 font-mono tracking-tight whitespace-pre-line leading-relaxed" id="summaryContentDisplay">
        載入中...
      </div>
      <div class="pt-2 flex-shrink-0 border-t border-gray-50 flex flex-col gap-2">
        <div class="text-center text-[10px] text-gray-400 font-mono" id="summaryTimestamp"></div>
        <button onclick="closeSummaryModal()" class="w-full bg-gray-100 text-gray-700 font-bold rounded-xl py-2.5 active:bg-gray-200 transition-colors">關閉</button>
      </div>
    </div>
  </div>

  <div class="app-container" id="scrollArea">
    <div class="bg-white shadow-sm flex flex-col sticky top-0 z-10 flex-shrink-0">
      <div class="p-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
           <h1 class="text-base font-bold text-gray-800" id="tripNameDisplay">連線中...</h1>
        </div>
        <div class="flex items-center gap-2">
           <div id="brokenLinkAlert" class="hidden text-[10px] text-rose-500 font-bold bg-rose-50 border border-rose-200 px-1.5 py-0.5 rounded shadow-sm">⚠ 資料異常</div>
           <div id="statusLight" class="w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse shadow-sm"></div>
        </div>
      </div>
      <div class="flex text-sm font-bold border-t border-gray-100 bg-gray-50/50" id="tabContainer" style="display: none;"></div>
    </div>

    <div class="p-4 flex flex-col h-full overflow-y-auto bg-gray-50/80" id="view-dashboard" style="display: none;">
      <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><span>🚀</span> 我的旅程總覽</h2>
      <div id="dashboardActive" class="space-y-4 mb-6"></div>
      <details class="group">
        <summary class="text-sm font-bold text-gray-500 mb-3 border-t border-gray-200 pt-4 flex items-center gap-2 cursor-pointer select-none">
          <span class="transition-transform group-open:rotate-90">▶</span> 🔒 歷史封存
        </summary>
        <div id="dashboardArchived" class="space-y-4 mt-2"></div>
      </details>
      <div class="pb-20"></div>
    </div>

    <div class="p-4 flex flex-col h-full overflow-y-auto bg-gray-50" id="view-settings" style="display: none;">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 mb-1">📍旅程名稱</label>
          <input type="text" id="setTripName" class="w-full bg-gray-50 rounded-lg p-2.5 text-sm border border-gray-200" placeholder="例: 南非挖礦團">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1">出發日</label>
            <input type="date" id="setStartDate" class="w-full bg-gray-50 rounded-lg p-2 text-sm border border-gray-200">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1">結束日</label>
            <input type="date" id="setEndDate" class="w-full bg-gray-50 rounded-lg p-2 text-sm border border-gray-200">
          </div>
        </div>
        
        <div class="border-t border-gray-100 pt-3">
          <div class="flex justify-between items-center mb-2">
            <label class="block text-xs font-bold text-gray-500 flex items-center gap-1">💱 旅程使用幣別</label>
            <span class="text-[9px] text-gray-400">點一次選取，點兩次設為預設，點三次取消</span>
          </div>
          <div id="currencyChipsArea" class="flex flex-wrap gap-2 mb-2"></div>
          <input type="hidden" id="setDefaultCurrency" value="TWD">
          <input type="hidden" id="setCurrencies" value="TWD">
        </div>

        <div id="newRateArea" class="hidden bg-rose-50 border border-rose-100 p-3 rounded-lg">
           <label class="block text-xs font-bold text-rose-800 mb-2">➕ 新增自訂幣別與匯率</label>
           <div class="flex items-center gap-2">
             <input type="text" id="setNewCurCode" maxlength="3" class="w-16 bg-white rounded-lg p-1.5 text-sm font-mono border border-rose-200 text-center uppercase" placeholder="代碼">
             <span class="text-sm font-mono text-rose-700 shrink-0">=</span>
             <input type="text" id="setNewRate" inputmode="decimal" class="flex-1 min-w-0 bg-white rounded-lg p-1.5 text-sm font-mono border border-rose-200 text-right" placeholder="例如：35.2">
             <span class="text-sm font-mono text-rose-700 shrink-0">TWD</span>
             <button type="button" onclick="confirmNewCurrency()" class="bg-rose-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold active:bg-rose-600">確認</button>
           </div>
        </div>
        
        <label id="agreeCloseLabel" class="flex items-start space-x-2 p-3 bg-teal-50 rounded-lg mt-4 border border-teal-100 cursor-pointer transition-opacity">
          <input type="checkbox" id="agreeCloseCb" class="mt-0.5 w-4 h-4 text-teal-600 rounded">
          <span class="text-xs text-teal-800 font-medium leading-relaxed">旅程完成後，我會記得點「結團」封存帳本。</span>
        </label>
        
        <div id="memberManagementArea" class="border-t border-gray-100 pt-4 mt-4 hidden">
          <div class="flex justify-between items-center mb-2">
             <h3 class="text-xs font-bold text-gray-500">🧸 旅伴管理</h3>
             <button onclick="triggerAddManual()" class="text-xs font-bold text-teal-600 bg-teal-50 border border-teal-100 px-2 py-1 rounded hover:bg-teal-100">➕ 新增手動旅伴</button>
          </div>
          <div id="memberListContainer" class="space-y-2"></div>
        </div>

      </div>

      <div id="activeSettingsArea" class="mt-4 space-y-3 hidden">
        <button onclick="sendInviteLink()" class="w-full bg-emerald-50 text-emerald-700 font-bold rounded-xl py-2 active:bg-emerald-100 border border-emerald-200">🔗 重發群組連結</button>
        <button onclick="promptArchiveTrip()" class="w-full bg-rose-50 text-rose-600 font-bold rounded-xl py-2 active:bg-rose-100 border border-rose-200">📦 結團封存為唯讀</button>
      </div>
      <div class="pb-24"></div>
    </div>

    <div class="pt-3 px-3 pb-0 flex flex-col h-full overflow-hidden" id="view-add" style="display: none;">
      <div class="h-full bg-white rounded-t-xl shadow-sm border-t border-l border-r border-gray-100 flex flex-col flex-grow overflow-hidden relative">
        <div class="p-3 space-y-3 flex-shrink-0 transition-all duration-200" id="addMainArea">
          <div class="flex space-x-3">
            <div class="w-[40%]">
              <label class="block text-xs font-medium text-gray-500 mb-1">付款人</label>
              <select id="payerSelect" class="w-full bg-teal-50 border border-teal-100 rounded-lg h-10 px-2 focus:outline-none text-teal-700 font-bold text-sm truncate shadow-inner"></select>
            </div>
            <div class="w-[60%]">
              <label class="block text-xs font-medium text-gray-500 mb-1">消費項目</label>
              <input type="text" id="descInput" placeholder="例: 扭蛋" class="w-full bg-gray-50 border border-gray-100 rounded-lg h-10 px-3 focus:outline-none focus:bg-white focus:ring-2 focus:ring-teal-400 text-base shadow-inner transition-all">
            </div>
          </div>
          <div class="flex space-x-3">
            <div class="w-[40%]">
              <label class="flex items-baseline text-xs font-medium text-gray-500 mb-1 whitespace-nowrap">
                幣別 <span id="rateDisplay" class="text-[9px] text-teal-500 ml-1 font-bold"></span>
              </label>
              <select id="currencySelect" class="live-trigger w-full bg-gray-50 border border-gray-100 rounded-lg h-10 px-3 focus:outline-none focus:bg-white text-gray-700 font-bold text-sm shadow-inner"></select>
            </div>
            <div class="w-[60%]">
              <label class="block text-xs font-medium text-gray-500 mb-1">總金額</label>
              <input type="text" id="amountInput" inputmode="decimal" placeholder="0" class="live-trigger font-mono tabular-nums tracking-tight w-full text-xl font-bold text-teal-600 bg-gray-50 border border-gray-100 rounded-lg h-10 px-3 focus:outline-none focus:bg-white focus:ring-2 focus:ring-teal-400 text-right shadow-inner transition-all">
            </div>
          </div>
        </div>
        <div class="border-t border-gray-50 pt-2.5 px-3 flex-shrink-0" id="splitModeAnchor">
          <label class="block text-xs font-medium text-gray-500 mb-2">分帳模式</label>
          <div id="splitModeButtons" class="grid grid-cols-4 gap-1.5">
            <button type="button" class="split-mode-btn active" data-mode="EQUAL">👥平均</button>
            <button type="button" class="split-mode-btn" data-mode="EXACT">🎯拆分</button>
            <button type="button" class="split-mode-btn" data-mode="SHARE">⚖️份數</button>
            <button type="button" class="split-mode-btn" data-mode="PERCENT">📈比例</button>
          </div>
          <input type="hidden" id="splitModeSelect" value="EQUAL">
        </div>
        <div class="bg-slate-50 border-t border-slate-200 flex flex-col flex-grow min-h-0 mt-3 rounded-t-xl">
          <div class="p-3 pb-2 flex justify-between items-center flex-shrink-0">
            <span class="text-xs font-bold text-gray-600">分帳明細</span>
            <span id="balanceStatus" class="text-[10px] font-bold text-gray-400">請輸入總金額</span>
          </div>
          <div id="splitDetailContainer" class="px-3 pb-32 space-y-1.5 overflow-y-auto flex-grow"></div>
        </div>
      </div>
    </div>

    <div class="flex flex-col h-full overflow-hidden bg-gray-50 relative" id="view-history" style="display: none;">
      <div class="bg-white shadow-sm z-10 flex-shrink-0 pt-2 pb-0 relative">
        <div class="space-y-2 px-3 pb-1">
          <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-gray-400 uppercase w-10 flex-shrink-0">📅 日期</span>
            <div id="dateFilters" class="flex gap-1.5 overflow-x-auto hide-scrollbar flex-grow"></div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-gray-400 uppercase w-10 flex-shrink-0">💳 付款</span>
            <div id="payerFilters" class="flex gap-1.5 overflow-x-auto hide-scrollbar flex-grow"></div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-gray-400 uppercase w-10 flex-shrink-0">🛍️ 分攤</span>
            <div id="splitterFilters" class="flex gap-1.5 overflow-x-auto hide-scrollbar flex-grow"></div>
          </div>
        </div>
        <div class="px-3 py-2.5 mt-1 flex justify-between items-center border-t border-gray-100">
          <button onclick="openSummaryModal()" class="text-[12px] border border-green-800 text-green-900 bg-transparent font-bold px-2.5 py-1 rounded-lg active:bg-amber-50/50 transition-colors tracking-widest">目前結算</button>
          <div class="flex items-baseline gap-1">
            <span class="text-[14px] font-bold text-gray-400 uppercase tracking-wider">總計</span>
            <span class="text-lg font-bold text-stone-700 font-mono tabular-nums tracking-tight">NT$<span id="filteredTotalTwd">0</span></span>
          </div>
        </div>
      </div>
      <div class="px-3 pt-1 flex-grow overflow-y-auto relative z-0">
        <div id="historyListContainer" class="space-y-3 pb-4"></div>
      </div>
      <div class="bg-gray-50 py-1.5 text-center text-xs font-bold text-gray-400 border-t border-gray-200 flex-shrink-0 z-20 relative">
        共 <span id="footerCountTotal">0</span> 筆
      </div>
    </div>
  </div>

  <div id="bottomBar" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 p-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-50">
    <button id="submitBtn" onclick="submitMainAction()" disabled class="w-full bg-teal-600 text-white font-bold text-base rounded-xl py-3 shadow-sm transition-all duration-200">
      讀取中...
    </button>
  </div>

  <script>
    const MY_LIFF_ID = "2010297900-38V2U0d0";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_KjMuAXfyZcRcjIJAGDrsxsg8n1KA7ROv_NeiGtzuOtjnvHMEIxAtTzMmCFECwVY/exec";
    
    let currentTripId = null, currentUserProfile = null, currentGroupId = null, tripGroupId = null;
    let MEMBER_LIST = [], GLOBAL_FEE_RATE = 0, CURRENT_RATE = 1.0, ALL_EXPENSES = [];
    let IS_ARCHIVED = false, IS_DRAFT = false, IS_CREATOR = false;
    let RATE_MATRIX = {}; 
    let currentTab = 'dashboard';
    let selectedDates = ['ALL'], selectedPayers = ['ALL'], selectedSplitters = ['ALL'];
    let localSupportedCurrencies = new Set(), localDefaultCurrency = "TWD";
    let isShowingNewCurrencyInput = false;
    let localCustomRates = {};
    let localAlias = ""; 
    let isSyncComplete = false;
    let LIVE_SUMMARY = "";
    // UUID 對應字典與失聯帳號清單
    let uuidToNameMap = {};
    let manualAccounts = [];
    let brokenLinks = [];
    const hapticVibrate = (pattern) => { 
      try {
        if (navigator.vibrate) navigator.vibrate(pattern);
      } catch (e) {
        console.warn("Haptic vibration blocked by browser intervention policy.", e);
      }
    };
    
    const showToast = (message, type = 'info') => {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const bgColors = { success: 'bg-emerald-600', error: 'bg-rose-600', info: 'bg-gray-800' };

    function toggleFilter(type, value) {
      hapticVibrate(20);

      else {

    function renderHistory() {
      const container = document.getElementById('historyListContainer');
      let totalTwdSum = 0; let htmlOutput = ""; let renderedCount = 0;
      let sorted = [...ALL_EXPENSES].sort((a, b) => new Date(b.date) - new Date(a.date));
      let currentGroupDate = '';

      sorted.forEach(exp => {
        let inDate = selectedDates.includes('ALL') || selectedDates.includes(exp.date); 
        let expPayerName = uuidToNameMap[exp.payer] || exp.payer;
        let inPayer = selectedPayers.includes('ALL') || selectedPayers.some(m => (uuidToNameMap[m] || m) === expPayerName);
        
        let splitObj = {}; try{ splitObj = JSON.parse(exp.displaySplitLocal) }catch(e){}
        let twdSplitObj = {}; try{ twdSplitObj = JSON.parse(exp.splitDetail) }catch(e){} 
        
        let inSplitter = selectedSplitters.includes('ALL') || selectedSplitters.some(m => {
          let filterName = uuidToNameMap[m] || m;
          return Object.entries(splitObj).some(([k, v]) => {
            return (uuidToNameMap[k] || k) === filterName && Number(v) > 0;
          });
        });

        if (inDate && inPayer && inSplitter) {
          if (selectedSplitters.includes('ALL')) {
            totalTwdSum += exp.twdAmount;
          } else {
            selectedSplitters.forEach(m => {
              let filterName = uuidToNameMap[m] || m;
              Object.entries(twdSplitObj).forEach(([k, v]) => {
                if ((uuidToNameMap[k] || k) === filterName) {
                  totalTwdSum += Number(v);
                }
              });
            });
          }
          renderedCount++;

          // 💡 縮小 Date Header 的 mt-4 到 mt-2 減少空白
          if (exp.date !== currentGroupDate) {
             currentGroupDate = exp.date;
             htmlOutput += `<div class="text-xs font-bold text-gray-500 mt-2 mb-1.5 flex items-center gap-1"><span class="text-base">📅</span> ${currentGroupDate.slice(5)}</div>`;
          }

          let payerDisplay = uuidToNameMap[exp.payer] || exp.payer;
          // 💡 分攤人與金額加上醒目綠色 (text-teal-600)，分隔線改為淡綠色
          let splitStr = Object.entries(splitObj).filter(([k,v]) => Number(v)>0).map(([k,v]) => `<span class="font-bold text-teal-600">${uuidToNameMap[k] || k}:</span><span class="font-bold font-mono tabular-nums text-teal-600">${v}</span>`).join(' <span class="text-teal-200/60">|</span> ');
          
          // 💡 左右雙欄重構，加入 👤、綠色明細、≈ NT$、弱化垃圾桶
          htmlOutput += `
            <div class="bg-white px-3 py-2 rounded-lg shadow-sm border border-gray-100 flex justify-between items-start relative hover:shadow-md transition-shadow">
              
              <div class="flex-1 min-w-0 pr-2 flex flex-col gap-0.5">
                <h4 class="text-base font-bold text-gray-800 truncate leading-tight">${exp.desc}</h4>
                <div class="text-[11px] text-gray-500 leading-tight mt-0.5">👤 ${payerDisplay} 付</div>
                <div class="text-[11px] mt-0.5 split-detail whitespace-normal break-words leading-tight">
                  ${splitStr}
                </div>
              </div>
              
              <div class="flex flex-col items-end shrink-0 pr-5">
                <div class="text-base font-bold text-teal-600 font-mono tabular-nums leading-tight">
                  ${exp.rawAmount.toLocaleString()} <span class="text-[10px] text-teal-400 font-sans font-normal">${exp.currency}</span>
                </div>
                <div class="text-[11px] text-gray-400 font-mono tabular-nums leading-tight mt-0.5">
                  ≈ NT$ ${exp.twdAmount.toLocaleString()}
                </div>
              </div>
              
              ${!IS_ARCHIVED ?
              `<button onclick="event.stopPropagation(); promptDelete('${exp.id}', '${exp.date}', '${exp.desc}', ${exp.rawAmount}, '${exp.currency}', '${exp.tripId}')" class="absolute right-0 top-1/2 -translate-y-1/2 text-gray-300 hover:text-rose-400 p-1.5 text-[10px] opacity-50 hover:opacity-100 active:bg-rose-50 rounded-lg transition-all">🗑️</button>` : ''}
            </div>
          `;
        }
      });
      if (htmlOutput === "") htmlOutput = `<div class="text-center text-sm text-gray-400 py-6">查無符合條件帳目</div>`;
      container.innerHTML = htmlOutput; 
      document.getElementById('filteredTotalTwd').innerText = totalTwdSum.toLocaleString();
      document.getElementById('footerCountTotal').innerText = renderedCount;
    }

    function renderCurrencyChips() {
       const area = document.getElementById('currencyChipsArea');
       let html = '';
       let allKeys = new Set([...Object.keys(RATE_MATRIX), ...localSupportedCurrencies]);
       Array.from(allKeys).forEach(c => {
          if(!c || c === 'TWD') return;
          if (!RATE_MATRIX[c] && !localSupportedCurrencies.has(c)) return; 
          
          let stateClass = '';
          if (c === localDefaultCurrency) stateClass = 'default';
          else if (localSupportedCurrencies.has(c)) stateClass = 'selected';
          html += `<button type="button" 
          onclick="handleChipClick('${c}')" class="chip-btn ${stateClass}">${c}</button>`;
       });
       
       let twdClass = (localDefaultCurrency === 'TWD') ?
       'default' : (localSupportedCurrencies.has('TWD') ? 'selected' : '');
       html = `<button type="button" onclick="handleChipClick('TWD')" class="chip-btn ${twdClass}">TWD</button>` + html;
       html += `<button type="button" onclick="toggleNewCurrencyArea()" class="chip-btn border-dashed border-gray-300 text-gray-400">➕ 自訂</button>`;
       area.innerHTML = html;

       document.getElementById('newRateArea').classList.toggle('hidden', !isShowingNewCurrencyInput);
       document.getElementById('setDefaultCurrency').value = localDefaultCurrency;
       document.getElementById('setCurrencies').value = Array.from(localSupportedCurrencies).join(', ');
    }

    function handleChipClick(currency) {
       hapticVibrate(20);
       if (!localSupportedCurrencies.has(currency)) {
           localSupportedCurrencies.add(currency);
       } else if (localSupportedCurrencies.has(currency) && localDefaultCurrency !== currency) {
           localDefaultCurrency = currency;
       } else if (localDefaultCurrency === currency) {
           localSupportedCurrencies.delete(currency);
           localDefaultCurrency = Array.from(localSupportedCurrencies)[0] || 'TWD';
           if (!localSupportedCurrencies.has(localDefaultCurrency)) localSupportedCurrencies.add(localDefaultCurrency);
       }
       renderCurrencyChips();
    }

       isShowingNewCurrencyInput = !isShowingNewCurrencyInput;

    function calculateLivePreview() {
      const rawAmount = parseFloat(document.getElementById('amountInput').value) || 0;
      const currency = document.getElementById('currencySelect').value; const mode = document.getElementById('splitModeSelect').value;
      const btn = document.getElementById('submitBtn'); const statusBar = document.getElementById('balanceStatus'); const rows = document.getElementById('splitDetailContainer').children;
      btn.disabled = false; 
      
      if (rawAmount <= 0) { 
        statusBar.innerHTML = `<span class="text-gray-400">請輸入總金額</span>`;
        btn.className = "w-full bg-gray-200 text-gray-500 font-bold text-base rounded-xl py-3 shadow-sm transition-all duration-200";
        btn.innerText = "🔒 請輸入有效金額";
        Array.from(rows).forEach(row => { const res = row.querySelector('.live-result'); if(res) res.innerText = ""; }); 
        return;
      }

      if(!isSyncComplete) {
         statusBar.innerHTML = `<span class="text-teal-600 animate-pulse">⏳ 正在與資料庫安全校準...</span>`;
         btn.className = "w-full bg-teal-500 text-white font-bold text-base rounded-xl py-3 shadow-md animate-pulse";
         btn.innerText = "⏳ 正在對齊數據...";
         return;
      }

      btn.className = "w-full bg-teal-600 text-white font-bold text-base rounded-xl py-3 shadow-md transition-all active:scale-[0.98]";
      if (mode === "EQUAL") {
        const checked = document.querySelectorAll('.split-checkbox:checked');
        if (checked.length === 0) { statusBar.innerHTML = `<span class="text-rose-500">❌ 至少需一人</span>`; btn.innerText = "🔒 需選擇分帳對象";
        btn.className = "w-full bg-gray-200 text-gray-500 font-bold text-base rounded-xl py-3 shadow-sm transition-all duration-200"; return;
        }
        let base = Math.floor(rawAmount / checked.length);
        let residue = rawAmount - (base * checked.length); let cIdx = 0;
        Array.from(rows).forEach(row => { const cb = row.querySelector('.split-checkbox'); const res = row.querySelector('.live-result'); if (cb && cb.checked) { let val = base + (cIdx === checked.length - 1 ? residue : 0); res.innerText = `${val.toLocaleString()}`; cIdx++; } else if (res) { res.innerText = "-"; } });
        statusBar.innerHTML = `<span class="text-emerald-600">✅ 均分完成</span>`; btn.innerText = "💾 儲存並同步至群組";
      } 
      else if (mode === "EXACT") {
        let currentForeignSum = 0;
        document.querySelectorAll('.split-input').forEach(input => currentForeignSum += (parseFloat(input.value) || 0)); let diff = rawAmount - currentForeignSum;
        if (Math.abs(diff) < 0.1) { statusBar.innerHTML = `<span class="text-emerald-600">✅ 帳目平衡</span>`; btn.innerText = "💾 儲存並同步至群組";
        } 
        else if (diff > 0) { statusBar.innerHTML = `<span class="text-teal-500">尚差 ${diff.toFixed(0)} ${currency}</span>`;
        btn.className = "w-full bg-gray-200 text-gray-500 font-bold text-base rounded-xl py-3 shadow-sm transition-all duration-200"; btn.innerText = `🔒 尚差 ${diff.toFixed(0)}`;
        } 
        else { statusBar.innerHTML = `<span class="text-rose-500">❌ 超出 ${Math.abs(diff).toFixed(0)} ${currency}</span>`;
        btn.className = "w-full bg-gray-200 text-gray-500 font-bold text-base rounded-xl py-3 shadow-sm transition-all duration-200"; btn.innerText = `🔒 金額超出`;
        }
      }
      else if (mode === "SHARE" || mode === "PERCENT") {
        let totalMetric = 0;
        document.querySelectorAll('.split-input').forEach(input => totalMetric += (parseFloat(input.value) || 0));
        if (mode === "SHARE" && totalMetric <= 0) { statusBar.innerHTML = `<span class="text-rose-500">❌ 總份數為 0</span>`;
        btn.className = "w-full bg-gray-200 text-gray-500 font-bold text-base rounded-xl py-3 shadow-sm transition-all duration-200"; btn.innerText = `🔒 請輸入有效份數`; return;
        }
        
        if (mode === "PERCENT" && Math.abs(totalMetric - 100) > 0.01) { 
            statusBar.innerHTML = `<span class="text-rose-500">❌ 比例須等於 100% (目前 ${totalMetric}%)</span>`;
            btn.className = "w-full bg-gray-200 text-gray-500 font-bold text-base rounded-xl py-3 shadow-sm transition-all duration-200";
            btn.innerText = `🔒 比例須等於 100%`; 
            return;
        }
        
        let calculatedSum = 0;
        let inputs = document.querySelectorAll('.split-input');
        inputs.forEach((input, idx) => { let val = parseFloat(input.value) || 0; let assigned = Math.floor(rawAmount * (val / totalMetric)); calculatedSum += assigned; if (idx === inputs.length - 1) assigned += (rawAmount - calculatedSum); const res = input.closest('div.flex.items-center.justify-between').querySelector('.live-result'); if(res) res.innerText = `${assigned.toLocaleString()}`; });
        statusBar.innerHTML = `<span class="text-emerald-600">✅ 換算完成</span>`; btn.innerText = "💾 儲存並同步至群組";
      }
    }

    async function submitExpense() {
      if (IS_ARCHIVED) return showToast("已封存旅程無法新增帳目", "error");
      const rawAmount = parseFloat(document.getElementById('amountInput').value) || 0;
      const mode = document.getElementById('splitModeSelect').value;
      if (rawAmount <= 0) return showToast("請輸入有效金額", "error");
      if (mode === "PERCENT") {
         let sum = 0;
         document.querySelectorAll('.split-input').forEach(i => sum += (parseFloat(i.value) || 0));
         if (Math.abs(sum - 100) > 0.01) return showToast("比例總和必須為 100%", "error");
      }
      if (mode === "EXACT") {
         let sum = 0;
         document.querySelectorAll('.split-input').forEach(i => sum += (parseFloat(i.value) || 0));
         if (Math.abs(rawAmount - sum) > 0.1) return showToast("分帳總額不平衡", "error");
      }

      hapticVibrate(50);
      const btn = document.getElementById('submitBtn'); const desc = document.getElementById('descInput').value.trim(); const currency = document.getElementById('currencySelect').value;
      const selectedPayerId = document.getElementById('payerSelect').value;
      const selectedPayerName = document.getElementById('payerSelect').options[document.getElementById('payerSelect').selectedIndex].text;
      
      const totalTwd = Math.round(rawAmount * CURRENT_RATE * (1 + GLOBAL_FEE_RATE));
      let splitDetailObj = {}; 
      let displaySplitLocalObj = {}; 
      
      if (mode === "EQUAL") { 
         const checkboxes = document.querySelectorAll('.split-checkbox:checked');
         let base = Math.floor(totalTwd / checkboxes.length); let residue = totalTwd - (base * checkboxes.length); let rawBase = Math.floor(rawAmount / checkboxes.length);
         let rawResidue = rawAmount - (rawBase * checkboxes.length);
         checkboxes.forEach((cb, idx) => { 
             let id = cb.getAttribute('data-id'); 
             splitDetailObj[id] = base + (idx === checkboxes.length - 1 ? residue : 0); 
             displaySplitLocalObj[id] = rawBase + (idx === checkboxes.length - 1 ? rawResidue : 0);
         });
      } 
      else if (mode === "EXACT") { 
         const inputs = document.querySelectorAll('.split-input');
         inputs.forEach(input => { 
             let val = parseFloat(input.value) || 0; let id = input.getAttribute('data-id'); 
             displaySplitLocalObj[id] = val;
             splitDetailObj[id] = Math.round(val * CURRENT_RATE * (1 + GLOBAL_FEE_RATE)); 
         });
         let calculatedTwdSum = Object.values(splitDetailObj).reduce((a, b) => a + b, 0); let residue = totalTwd - calculatedTwdSum; 
         const lastPerson = Array.from(inputs).pop().getAttribute('data-id');
         if(residue !== 0) splitDetailObj[lastPerson] += residue; 
      } 
      else if (mode === "SHARE" || mode === "PERCENT") { 
         const inputs = document.querySelectorAll('.split-input');
         let totalMetric = 0, metricMap = {}; 
         inputs.forEach(input => { let val = parseFloat(input.value) || 0; let id = input.getAttribute('data-id'); metricMap[id] = val; totalMetric += val; });
         let calculatedSumTwd = 0; let calculatedSumRaw = 0;
         MEMBER_LIST.forEach(id => { 
             splitDetailObj[id] = Math.round(totalTwd * (metricMap[id] / totalMetric)); calculatedSumTwd += splitDetailObj[id]; 
             displaySplitLocalObj[id] = Math.floor(rawAmount * (metricMap[id] / totalMetric)); calculatedSumRaw += displaySplitLocalObj[id];
         });
         let residueTwd = totalTwd - calculatedSumTwd; let residueRaw = rawAmount - calculatedSumRaw;
         if(residueTwd !== 0 && MEMBER_LIST.length > 0) splitDetailObj[MEMBER_LIST[MEMBER_LIST.length - 1]] += residueTwd;
         if(residueRaw !== 0 && MEMBER_LIST.length > 0) displaySplitLocalObj[MEMBER_LIST[MEMBER_LIST.length - 1]] += residueRaw;
      }

      btn.disabled = true; btn.innerText = "⏳ 儲存交易中...";
      try {
        const payload = { action: "addExpense", tripId: currentTripId, groupId: currentGroupId, payerUserId: selectedPayerId, description: desc, rawAmount: rawAmount, currency: currency, exchangeRate: CURRENT_RATE, splitMode: mode, splitDetailString: JSON.stringify(splitDetailObj), displaySplitLocalString: JSON.stringify(displaySplitLocalObj) };
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) }); const result = await res.json();
        if (result.status === "success") {
          showToast("儲存成功！", "success");
          localStorage.removeItem("nomad_cache_" + currentTripId);
          let detailArr = []; const rows = document.getElementById('splitDetailContainer').children;
          Array.from(rows).forEach(row => { 
            let name = row.querySelector('span.font-medium').innerText; let val = 0;
            let input = row.querySelector('.split-input');
            if (mode === "EXACT") { val = parseFloat(input.value) || 0; } 
            else { 
              let resSpan = row.querySelector('.live-result'); 
              if(resSpan && resSpan.innerText && resSpan.innerText !== "-") { val = parseFloat(resSpan.innerText.replace(/[^\d.-]/g, '')); } 
            }
            if(val > 0) detailArr.push(`${name} ${val.toLocaleString()}`); 
          });
          const detailText = detailArr.join(" | ");
          
          const notifyMsg = `📝 ${desc || "未命名消費"}\n💰 ${currency}${rawAmount.toLocaleString()}  (${selectedPayerName}付)\n[明細]\n${detailText}`;
          liff.sendMessages([{ type: 'text', text: notifyMsg }]).catch(err => console.warn("明細推播失敗:", err));
          setTimeout(() => liff.closeWindow(), 500);
        } else throw new Error();
      } catch (err) { showToast("網絡通訊錯誤，請重試", "error"); hapticVibrate([50, 50, 50]); btn.disabled = false; btn.innerText = "💾 儲存並同步至群組";
      }
    }

    async function initializeLiff() {
      const statusLight = document.getElementById('statusLight');
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) return liff.login();
        const urlParams = new URLSearchParams(window.location.search);
        currentTripId = urlParams.get('tripId') || "null"; 
        const ctx = liff.getContext();
        currentGroupId = ctx?.groupId || ctx?.roomId || "ONLINE_TEST"; 
        
        const idToken = liff.getDecodedIDToken();
        currentUserProfile = {
          userId: ctx?.userId || liff.getContext()?.userId || "UNKNOWN_USER",
          displayName: idToken?.name || "User"
        };

        const rawCache = localStorage.getItem("nomad_cache_" + currentTripId);
        if (rawCache && currentTripId !== "null") {
           try {
              const cachedData = JSON.parse(rawCache);
              applyServerDataToUI(cachedData, true);
           } catch(cacheErr) { localStorage.removeItem("nomad_cache_" + currentTripId); }
        }

        const payload = { action: "initWeb", tripId: currentTripId, groupId: currentGroupId, userId: currentUserProfile.userId };
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "error") { throwFatalError("存取遭拒", result.message); return; }

        if (result.status === "success") {
           localStorage.setItem("nomad_cache_" + currentTripId, JSON.stringify(result));
        }

        applyServerDataToUI(result, false);
      } catch (err) { 
        statusLight.classList.replace('bg-yellow-400', 'bg-rose-500'); 
        statusLight.classList.remove('animate-pulse'); 
        throwFatalError("安全閘口中斷", err.message || "通訊失敗");
      }
    }

    function applyServerDataToUI(result, isWeakSeed) {
        const statusLight = document.getElementById('statusLight');
        const renderTripCard = (t, statusClass, statusText) => `
          <div onclick="navigateToTrip('${t.id}')" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md active:scale-[0.98] transition-all relative group overflow-hidden">
            <div class="absolute inset-0 bg-teal-50 opacity-0 group-active:opacity-100 transition-opacity"></div>
            <div class="relative z-10 flex justify-between items-start mb-1">
              <span class="font-bold text-base text-gray-800 tracking-tight">${t.name}</span>
              <span class="text-[10px] ${statusClass} px-2 py-0.5 rounded font-bold shadow-sm">${statusText}</span>
            </div>
            <div class="relative z-10 text-[10px] text-gray-400 mb-2 font-mono tracking-tight">${t.dateRange}</div>
            <div class="relative z-10 flex space-x-3 text-[11px] font-bold text-gray-500 border-t border-gray-50 pt-2">
              <span class="flex items-center">👥 <span class="ml-1 font-mono">${t.memberCount}</span></span>
              <span class="flex items-center">📝 <span class="ml-1 font-mono">${t.expenseCount}</span></span>
            </div>
          </div>
        `;
        if (result.status === "dashboard") {
          document.getElementById('tripNameDisplay').innerText = `總控台 (Hi, ${result.suggestedName || currentUserProfile.displayName})`;
          let html = result.activeTrips.length === 0 ? `<p class="text-sm text-gray-400 text-center py-6">目前無進行中的旅程</p>` : result.activeTrips.map(t => renderTripCard(t, "bg-emerald-50 text-emerald-600 border border-emerald-100", "記錄中")).join('');
          if (result.canCreate) {
             if (/^[CR]/.test(currentGroupId)) {
                html = `<button onclick="switchTab('settings')" class="w-full bg-teal-50 border border-teal-200 text-teal-600 font-bold rounded-xl py-3 mb-4 shadow-sm active:bg-teal-100 transition-colors flex items-center justify-center gap-2"><span>➕</span> 建立新旅程</button>` + html;
                IS_CREATOR = true; IS_DRAFT = true; 
             } else {
                html = `<div class="w-full bg-gray-50 border border-gray-200 text-gray-500 text-sm font-bold rounded-xl py-3 mb-4 shadow-sm flex items-center justify-center gap-2">⚠️ 請至實體 LINE 群組內輸入 /new 建立旅程</div>` + html;
             }
          }
          document.getElementById('dashboardActive').innerHTML = html;
          document.getElementById('dashboardArchived').innerHTML = result.archivedTrips.length === 0 ? `<p class="text-sm text-gray-400 text-center py-6">無歷史封存記錄</p>` : result.archivedTrips.map(t => renderTripCard(t, "bg-gray-100 text-gray-500 border border-gray-200", "歷史封存")).join('');
          if(!isWeakSeed) { statusLight.classList.replace('bg-yellow-400', 'bg-emerald-500'); statusLight.classList.remove('animate-pulse'); }
          switchTab('dashboard'); return;
        }

        if (result.status === "success") {
          if (!result.isRegistered && result.tripStatus !== 'DRAFT') { 
            if (result.manualAccounts && result.manualAccounts.length > 0) {
              const claimSelect = document.getElementById('claimTargetSelect');
              claimSelect.classList.remove('hidden');
              
              let opts = '';
              result.manualAccounts.forEach(m => opts += `<option value="${m.id}" data-name="${m.name}">👉 認領：${m.name}</option>`);
              opts += `<option value="">➕ 自訂新帳號</option>`;
              claimSelect.innerHTML = opts;
              claimSelect.onchange = (e) => {
                 if (e.target.value) {
                     document.getElementById('realNameInput').value = e.target.options[e.target.selectedIndex].getAttribute('data-name');
                 } else {
                     document.getElementById('realNameInput').value = result.suggestedName || currentUserProfile.displayName;
                 }
              };
              claimSelect.dispatchEvent(new Event('change'));
            } else {
              document.getElementById('realNameInput').value = result.suggestedName || currentUserProfile.displayName; 
            }
            document.getElementById('registrationModal').classList.remove('hidden'); return;
          }
          
          if (result.brokenLinks && result.brokenLinks.length > 0) {
              document.getElementById('brokenLinkAlert').classList.remove('hidden');
              console.warn("Broken Links Detected:", result.brokenLinks);
          }

          IS_ARCHIVED = (result.tripStatus === 'ARCHIVED');
          IS_DRAFT = (result.tripStatus === 'DRAFT');
          IS_CREATOR = result.isCreator;
          RATE_MATRIX = result.rateMatrix || {}; 
          GLOBAL_FEE_RATE = result.feeRate || 0;
          uuidToNameMap = result.uuidToNameMap || {};
          MEMBER_LIST = result.members || []; 
          ALL_EXPENSES = result.expenses || []; 
          localAlias = result.suggestedName || "";
          
          tripGroupId = result.tripGroupId || null; 
          LIVE_SUMMARY = result.liveSummary || "";

          let curStr = result.currenciesStr || "TWD";
          let tempSet = new Set(curStr.split(',').map(s=>s.trim().toUpperCase()));
          localSupportedCurrencies = new Set([...tempSet].filter(c => RATE_MATRIX[c] || c === 'TWD'));
          
          localDefaultCurrency = result.defaultCurrency || "TWD";
          if (localDefaultCurrency !== 'TWD' && !RATE_MATRIX[localDefaultCurrency]) { localDefaultCurrency = 'TWD';
          }
          localSupportedCurrencies.add(localDefaultCurrency);

          let tabsHtml = '';
          if (!IS_DRAFT && !IS_ARCHIVED) tabsHtml += `<div data-tab="add" onclick="switchTab('add')" class="tab-btn w-1/3 text-center py-2.5 text-gray-400 border-b-2 border-transparent cursor-pointer transition-colors font-bold">✏️ 記一筆帳</div>`;
          if (!IS_DRAFT) tabsHtml += `<div data-tab="history" onclick="switchTab('history')" class="tab-btn ${IS_ARCHIVED ? 'w-full' : 'w-1/3'} text-center py-2.5 text-gray-400 border-b-2 border-transparent cursor-pointer transition-colors font-bold">📜 帳務明細</div>`;
          if (IS_CREATOR || IS_DRAFT) tabsHtml += `<div data-tab="settings" onclick="switchTab('settings')" class="tab-btn ${IS_DRAFT ? 'w-full' : 'w-1/3'} text-center py-2.5 text-gray-400 border-b-2 border-transparent cursor-pointer transition-colors font-bold">⚙️ 旅程管理</div>`;
          document.getElementById('tabContainer').innerHTML = tabsHtml;

          if (IS_CREATOR || IS_DRAFT) {
             document.getElementById('setTripName').value = result.tripName || "";
             if(result.startDate) document.getElementById('setStartDate').value = result.startDate.replace(/\//g, '-');
             if(result.endDate) document.getElementById('setEndDate').value = result.endDate.replace(/\//g, '-');
             renderCurrencyChips();
             if(!IS_DRAFT && !isWeakSeed) {
                document.getElementById('activeSettingsArea').classList.remove('hidden');
                document.getElementById('agreeCloseCb').checked = true;
                document.getElementById('agreeCloseCb').disabled = true;
                document.getElementById('agreeCloseLabel').classList.add('opacity-50', 'pointer-events-none');
                renderMembersManagement(); 
             }
          }

          if (IS_DRAFT) {
             document.getElementById('tripNameDisplay').innerText = `✏️ 旅遊帳本申請`;
             document.getElementById('tabContainer').style.display = 'flex';
             if(!isWeakSeed) { statusLight.classList.replace('bg-yellow-400', 'bg-emerald-500'); statusLight.classList.remove('animate-pulse'); }
             switchTab('settings');
             return;
          }

          CURRENT_RATE = RATE_MATRIX[localDefaultCurrency] || 1.0;
          const payerSel = document.getElementById('payerSelect');
          let prevSelectedPayer = payerSel.value;
          payerSel.innerHTML = MEMBER_LIST.map(id => `<option value="${id}">${uuidToNameMap[id] || id}</option>`).join('');
          if(MEMBER_LIST.includes(prevSelectedPayer)) payerSel.value = prevSelectedPayer;
          else if (currentUserProfile && MEMBER_LIST.includes(currentUserProfile.userId)) { payerSel.value = currentUserProfile.userId; }
          
          const curSelect = document.getElementById('currencySelect');
          let prevSelectedCur = curSelect.value;
          curSelect.innerHTML = Array.from(localSupportedCurrencies).map(c => `<option value="${c}">${c}</option>`).join('');
          curSelect.value = prevSelectedCur || localDefaultCurrency;
          document.getElementById('rateDisplay').innerText = `(1 : ${CURRENT_RATE} TWD)`;
          document.getElementById('tripNameDisplay').innerHTML =
            `${IS_ARCHIVED ? '📦' : '✈️'} ${result.tripName}
             <span class="text-[11px] text-gray-400 font-normal ml-1">
               ${result.startDate} ~ ${result.endDate}
             </span>`;
          document.getElementById('tabContainer').style.display = 'flex';
          initHistoryFilters(); 
          renderSplitDetailAdd(); 
          
          if(!isWeakSeed) {
             isSyncComplete = true;
             statusLight.classList.replace('bg-yellow-400', 'bg-emerald-500'); 
             statusLight.classList.remove('animate-pulse');
          }
          
          calculateLivePreview();
          if (currentTab === 'dashboard') {
             if (IS_ARCHIVED) switchTab('history');
             else switchTab('add');
          }
        }
    }

    function openSummaryModal() {
       hapticVibrate(50);
       let displayStr = LIVE_SUMMARY || "目前尚無結算資料或已結清。";
       displayStr = displayStr.replace(/\n\s*(NT\$)/g, '  $1');
       document.getElementById('summaryContentDisplay').innerText = displayStr;
       
       const d = new Date();
       const nowStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
       document.getElementById('summaryTimestamp').innerText = nowStr;
       
       document.getElementById('summaryModal').classList.remove('hidden');
    }
    function closeSummaryModal() {
       document.getElementById('summaryModal').classList.add('hidden');
    }

    document.addEventListener('click', function(e) {
      const btn = e.target.closest('.split-mode-btn');
      if(!btn) return;
      hapticVibrate(20);
      document.querySelectorAll('.split-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('splitModeSelect').value = btn.dataset.mode;
      renderSplitDetailAdd();
      calculateLivePreview();
    });
    initializeLiff();
  </script>
</body>
</html>
