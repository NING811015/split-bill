<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>極速記帳 V4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-32">

  <div class="bg-white shadow-sm p-4 sticky top-0 z-10">
    <h1 class="text-lg font-bold text-gray-800" id="tripNameDisplay">讀取旅程中...</h1>
    <p class="text-xs text-gray-400" id="statusLog">正在連線至加密資料庫</p>
  </div>

  <div class="p-4 space-y-4" id="mainForm" style="display: none;">
    
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">消費項目</label>
      <input type="text" id="descInput" placeholder="例：橋村炸雞" class="w-full bg-white border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>

    <div class="flex space-x-2">
      <div class="w-2/3">
        <label class="block text-sm font-medium text-gray-600 mb-1">金額 (外幣)</label>
        <input type="text" id="amountInput" inputmode="decimal" pattern="[0-9]*" placeholder="0" class="w-full text-xl bg-white border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div class="w-1/3">
        <label class="block text-sm font-medium text-gray-600 mb-1">幣別</label>
        <select id="currencySelect" class="w-full bg-white border border-gray-200 rounded-lg p-3 focus:outline-none border-gray-200">
          <option value="KRW">KRW</option>
          <option value="JPY">JPY</option>
          <option value="VND">VND</option>
          <option value="TWD">TWD</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">當前匯率 (外幣轉台幣)</label>
      <input type="text" id="rateInput" inputmode="decimal" value="1.0" class="w-full bg-gray-100 border border-gray-200 rounded-lg p-3 focus:outline-none">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">分帳模式</label>
      <select id="splitModeSelect" class="w-full bg-white border border-gray-200 rounded-lg p-3 focus:outline-none border-gray-200">
        <option value="EQUAL">👥 全員平攤 (EQUAL)</option>
        <option value="EXACT">🎯 指定金額 (EXACT - TWD)</option>
        <option value="SHARE">⚖️ 人頭份數 (SHARE)</option>
        <option value="PERCENT">📈 比例分配 (PERCENT - %)</option>
      </select>
    </div>

    <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm space-y-3">
      <h3 class="text-sm font-bold text-gray-700 border-b border-gray-100 pb-2">分帳細節明細</h3>
      <div id="splitDetailContainer" class="space-y-3 max-h-60 overflow-y-auto">
        </div>
    </div>

  </div>

  <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 shadow-lg pb-safe z-50">
    <button id="submitBtn" onclick="submitExpense()" class="w-full bg-blue-500 text-white font-bold text-lg rounded-xl py-3 shadow-sm active:bg-blue-600 disabled:bg-gray-300 transition-colors">
      💾 儲存並同步至群組
    </button>
  </div>

  <script>
    const MY_LIFF_ID = "2010297900-38V2U0d0";
    const GAS_WEB_APP_URL = "填入妳最新部署的_GAS_WebApp_Url";
    
    let currentTripId = null;
    let currentUserProfile = null;
    let currentGroupId = null;

    const RATE_MATRIX = { "TWD": 1.0, "KRW": 0.024, "JPY": 0.22, "VND": 0.0013 };
    // 離線防禦白名單：若雲端拉取失敗，以此預設名單頂替，防表單掛點
    let MEMBER_LIST = ["Ning", "團員A", "團員B"]; 

    // 監聽 1：幣別選單變更
    document.getElementById('currencySelect').addEventListener('change', function(e) {
      document.getElementById('rateInput').value = RATE_MATRIX[e.target.value] || 1.0;
    });

    // 監聽 2：分帳模式變更
    document.getElementById('splitModeSelect').addEventListener('change', renderSplitDetail);

    // 核心函式：動態表單渲染器 (Dynamic Component Router)
    function renderSplitDetail() {
      const mode = document.getElementById('splitModeSelect').value;
      const container = document.getElementById('splitDetailContainer');
      container.innerHTML = "";

      if (mode === "EQUAL") {
        container.innerHTML = `<p class="text-xs text-gray-400 py-2">➔ 系統將自動由現存的 ${MEMBER_LIST.length} 位團員進行絕對均分。</p>`;
        return;
      }

      MEMBER_LIST.forEach(name => {
        const row = document.createElement('div');
        row.className = "flex items-center justify-between space-x-4 bg-gray-50 p-2 rounded-lg";
        
        let inputHtml = "";
        if (mode === "EXACT") {
          inputHtml = `<div class="flex items-center"><span class="text-xs text-gray-400 mr-1">$</span><input type="text" data-name="${name}" inputmode="numeric" placeholder="0" class="split-input w-20 text-right bg-white border border-gray-200 rounded p-1 text-sm focus:outline-none"></div>`;
        } else if (mode === "SHARE") {
          inputHtml = `<div class="flex items-center"><input type="text" data-name="${name}" inputmode="decimal" value="1" class="split-input w-16 text-center bg-white border border-gray-200 rounded p-1 text-sm focus:outline-none"><span class="text-xs text-gray-400 ml-1">份</span></div>`;
        } else if (mode === "PERCENT") {
          inputHtml = `<div class="flex items-center"><input type="text" data-name="${name}" inputmode="numeric" placeholder="0" class="split-input w-16 text-right bg-white border border-gray-200 rounded p-1 text-sm focus:outline-none"><span class="text-xs text-gray-400 ml-1">%</span></div>`;
        }

        row.innerHTML = `<span class="text-sm font-medium text-gray-700">${name}</span>${inputHtml}`;
        container.appendChild(row);
      });
    }

    // 初始化連線與資料載入
    async function initializeLiff() {
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) return liff.login();

        const urlParams = new URLSearchParams(window.location.search);
        currentTripId = urlParams.get('tripId');
        currentGroupId = liff.getContext().groupId || "ONLINE_TEST";
        currentUserProfile = await liff.getProfile();

        if (!currentTripId) throw new Error("查無旅程變數 ID。");

        const statusLog = document.getElementById('statusLog');
        statusLog.innerText = "⏳ 正在同步雲端最新匯率與成員矩陣...";

        try {
          const payload = { action: "initWeb", tripId: currentTripId, groupId: currentGroupId };
          const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
          const result = await res.json();

          if (result.status === "success") {
            RATE_MATRIX[result.currency] = result.rate;
            document.getElementById('currencySelect').value = result.currency;
            document.getElementById('rateInput').value = result.rate;
            document.getElementById('tripNameDisplay').innerText = `記一筆消費 [${result.tripName}]`;
            
            if(result.members && result.members.length > 0) {
              MEMBER_LIST = result.members; // 覆寫為雲端真實成員
            }
            statusLog.innerText = "✅ 雲端數據同步完成";
          } else throw new Error("後端拒絕連線");
        } catch (fetchErr) {
          statusLog.innerText = "⚠️ 同步失敗，已加載離線安全快取矩陣";
          statusLog.className = "text-xs text-yellow-600 font-bold";
        }

        renderSplitDetail(); // 觸發初始渲染
        document.getElementById('mainForm').style.display = 'block';

      } catch (err) {
        document.getElementById('statusLog').innerText = "❌ 系統阻斷：" + err.message;
        document.getElementById('statusLog').className = "text-xs text-red-500 font-bold";
      }
    }

    // 核心演算發動機 (Frontend Compute & Validation Engine)
    async function submitExpense() {
      const btn = document.getElementById('submitBtn');
      const desc = document.getElementById('descInput').value.trim();
      const rawAmount = parseFloat(document.getElementById('amountInput').value);
      const currency = document.getElementById('currencySelect').value;
      const exchangeRate = parseFloat(document.getElementById('rateInput').value);
      const splitMode = document.getElementById('splitModeSelect').value;

      if (!desc || isNaN(rawAmount) || rawAmount <= 0) return alert("請輸入正確的項目與金額");

      // 預計換算的總台幣金額
      const totalTwd = Math.round(rawAmount * exchangeRate);
      let splitDetailObj = {};

      // 取得所有動態輸入框數據
      const inputs = document.querySelectorAll('.split-input');
      
      // 演算路由分配 (Algorithm Routing)
      if (splitMode === "EQUAL") {
        let base = Math.floor(totalTwd / MEMBER_LIST.length);
        let residue = totalTwd - (base * MEMBER_LIST.length);
        MEMBER_LIST.forEach((name, idx) => {
          // 殘差由最後一位吸收，確保總和絕對守恆
          splitDetailObj[name] = base + (idx === MEMBER_LIST.length - 1 ? residue : 0);
        });
      } 
      else if (splitMode === "EXACT") {
        let currentSum = 0;
        inputs.forEach(input => {
          let val = Math.round(parseFloat(input.value) || 0);
          let name = input.getAttribute('data-name');
          splitDetailObj[name] = val;
          currentSum += val;
        });
        // 金流阻斷防禦：手動分配金額之加總必須絕對等於總台幣
        if (currentSum !== totalTwd) {
          return alert(`❌ 金額不守恆：手動分配總和 ($${currentSum}) 不等於消費台幣總額 ($${totalTwd})，相差 ${totalTwd - currentSum} 元。`);
        }
      } 
      else if (splitMode === "SHARE") {
        let totalShares = 0;
        let shareMap = {};
        inputs.forEach(input => {
          let val = parseFloat(input.value) || 0;
          let name = input.getAttribute('data-name');
          shareMap[name] = val;
          totalShares += val;
        });
        if (totalShares <= 0) return alert("❌ 總份數不可為 0");
        
        let calculatedSum = 0;
        MEMBER_LIST.forEach(name => {
          splitDetailObj[name] = Math.round(totalTwd * (shareMap[name] / totalShares));
          calculatedSum += splitDetailObj[name];
        });
        // 殘差校正：因四捨五入產生的微小殘差，由最後一位團員調節
        let residue = totalTwd - calculatedSum;
        if(residue !== 0 && MEMBER_LIST.length > 0) {
          splitDetailObj[MEMBER_LIST[MEMBER_LIST.length - 1]] += residue;
        }
      } 
      else if (splitMode === "PERCENT") {
        let totalPercent = 0;
        let percentMap = {};
        inputs.forEach(input => {
          let val = parseFloat(input.value) || 0;
          let name = input.getAttribute('data-name');
          percentMap[name] = val;
          totalPercent += val;
        });
        // 金流阻斷防禦：百分比加總必須精準等於 100%
        if (Math.abs(totalPercent - 100) > 0.01) {
          return alert(`❌ 比例錯誤：百分比總和為 ${totalPercent}%，必須恆等於 100%。`);
        }

        let calculatedSum = 0;
        MEMBER_LIST.forEach(name => {
          splitDetailObj[name] = Math.round(totalTwd * (percentMap[name] / 100));
          calculatedSum += splitDetailObj[name];
        });
        let residue = totalTwd - calculatedSum;
        if(residue !== 0 && MEMBER_LIST.length > 0) {
          splitDetailObj[MEMBER_LIST[MEMBER_LIST.length - 1]] += residue;
        }
      }

      // 封鎖按鈕防止重複提交
      btn.disabled = true;
      btn.innerText = "⏳ 寫入雲端矩陣中...";

      const payload = {
        action: "addExpense",
        tripId: currentTripId,
        groupId: currentGroupId,
        payerUserId: currentUserProfile.userId,
        description: desc,
        rawAmount: rawAmount,
        currency: currency,
        exchangeRate: exchangeRate,
        splitMode: splitMode,
        splitDetailString: JSON.stringify(splitDetailObj) // 前端算力直接解出靜態 JSON 映射表
      };

      try {
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "success") {
          const modeMsg = { "EQUAL":"全員平攤", "EXACT":"指定金額", "SHARE":"人頭權重", "PERCENT":"比例分配" };
          const msgText = `📝 ${currentUserProfile.displayName} 已記帳 [${modeMsg[splitMode] || "自訂"}]：\n${desc} $${rawAmount} ${currency} (約 $${totalTwd} TWD)`;
          await liff.sendMessages([{ type: 'text', text: msgText }]);
          liff.closeWindow();
        } else throw new Error("後端拒絕寫入");
      } catch (err) {
        alert("網路通訊錯誤，請重試。");
        btn.disabled = false;
        btn.innerText = "💾 重試儲存";
      }
    }

    initializeLiff();
  </script>
</body>
</html>
