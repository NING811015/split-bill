<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>NoMad Split</title>
  <meta property="og:title" content="NoMad Split">
  <meta property="og:description" content="Stay NoMad. Split the bill.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    html, body { height: 100%; overflow: hidden; background-color: #f9fafb; }
    .app-container { height: calc(100% - 76px); display: flex; flex-direction: column; }
    .btn-hidden { display: none !important; }
    .filter-btn { transition: all 0.15s; }
    .filter-btn.active { background-color: #EFF6FF; color: #1D4ED8; font-weight: 700; box-shadow: inset 0 0 0 1px #BFDBFE; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .chip-btn { padding: 4px 12px; border-radius: 9999px; border: 1px solid #E5E7EB; background: #fff; font-size: 11px; font-weight: 600; color: #6B7280; transition: all 0.15s; }
    .chip-btn.selected { background: #EEF4FF; border-color: #3B82F6; color: #2563EB; }
    .chip-btn.default { background: #1D4ED8; border-color: #1E3A8A; color: #fff; } 
    
    .modal-overlay { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(2px); }
    .toast-enter { transform: translateY(-100%); opacity: 0; }
    .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .toast-exit { transform: translateY(-20%); opacity: 0; transition: all 0.2s ease-in; }
    .split-mode-btn { height:40px; background:#F9FAFB; border:1px solid #E5E7EB; border-radius:10px; font-size:12px; font-weight:600; color:#6B7280; transition:all .15s; }
    .split-mode-btn.active { background:#EEF4FF; border-color:#3B82F6; color:#2563EB;}
    .split-mode-btn:active { transform:scale(.97);}
    
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="text-gray-800 font-sans relative">

  <div id="toastContainer" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[200] flex flex-col space-y-2 w-[90%] max-w-sm pointer-events-none"></div>

  <div id="errorModal" class="absolute inset-0 z-[150] bg-gray-900 bg-opacity-95 flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center space-y-4">
      <div class="text-4xl">🛑</div>
      <h2 class="text-xl font-bold text-gray-800" id="errorModalTitle">存取遭拒</h2>
      <p class="text-sm text-gray-500" id="errorModalDesc">您沒有權限存取此頁面。</p>
      <button onclick="liff.closeWindow()" class="w-full bg-gray-200 text-gray-700 font-bold rounded-xl py-3 active:bg-gray-300">關閉</button>
    </div>
  </div>

  <div id="registrationModal" class="absolute inset-0 z-[100] bg-gray-900 bg-opacity-95 flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center space-y-4">
      <div class="text-4xl">👋</div>
      <h2 class="text-xl font-bold text-gray-800">歡迎加入旅程</h2>
      <p class="text-sm text-gray-500">請設定群組內可辨識的暱稱（限 5 個字以內）。</p>
      <input type="text" id="realNameInput" maxlength="5" placeholder="請輸入暱稱" class="w-full bg-gray-50 border border-gray-100 rounded-lg p-3 text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-inner">
      <button id="registerBtn" onclick="submitRegistration()" class="w-full bg-blue-600 text-white font-bold rounded-xl py-3 active:bg-blue-700 shadow-md transition-transform active:scale-[0.98]">完成註冊並進入</button>
    </div>
  </div>

  <div id="deleteModal" class="absolute inset-0 z-[90] modal-overlay flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl space-y-4 transform transition-all">
      <h3 class="text-lg font-bold text-red-600 flex items-center">⚠️ 確認撤銷帳目？</h3>
      <p class="text-sm text-gray-600 font-mono tabular-nums tracking-tight whitespace-pre-line" id="deleteTargetDesc"></p>
      <div class="flex space-x-3 pt-2">
        <button onclick="closeDeleteModal()" class="w-1/2 bg-gray-100 text-gray-700 font-bold rounded-xl py-2.5 active:bg-gray-200 transition-colors">取消</button>
        <button id="confirmDeleteBtn" class="w-1/2 bg-red-500 text-white font-bold rounded-xl py-2.5 shadow-md active:bg-red-600 transition-transform active:scale-[0.98]">確定撤銷</button>
      </div>
    </div>
  </div>

  <div class="app-container" id="scrollArea">
    <div class="bg-white shadow-sm flex flex-col sticky top-0 z-10 flex-shrink-0">
      <div class="p-3 flex items-center justify-between">
        <h1 class="text-base font-bold text-gray-800" id="tripNameDisplay">連線中...</h1>
        <div id="statusLight" class="w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse shadow-sm"></div>
      </div>
      <div class="flex text-sm font-bold border-t border-gray-100 bg-gray-50/50" id="tabContainer" style="display: none;"></div>
    </div>

    <div class="p-4 flex flex-col h-full overflow-y-auto bg-gray-50/80" id="view-dashboard" style="display: none;">
      <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><span>🚀</span> 我的旅程總覽</h2>
      <div id="dashboardActive" class="space-y-4 mb-6"></div>
      
      <details class="group">
        <summary class="text-sm font-bold text-gray-500 mb-3 border-t border-gray-200 pt-4 flex items-center gap-2 cursor-pointer select-none">
          <span class="transition-transform group-open:rotate-90">▶</span> 🔒 歷史封存
        </summary>
        <div id="dashboardArchived" class="space-y-4 mt-2"></div>
      </details>
      <div class="pb-20"></div>
    </div>

    <div class="p-4 flex flex-col h-full overflow-y-auto bg-gray-50" id="view-settings" style="display: none;">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 mb-1">📍 旅程名稱</label>
          <input type="text" id="setTripName" class="w-full bg-gray-50 rounded-lg p-2.5 text-sm border border-gray-200" placeholder="例如：首爾">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1">出發日</label>
            <input type="date" id="setStartDate" class="w-full bg-gray-50 rounded-lg p-2 text-sm border border-gray-200">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1">結束日</label>
            <input type="date" id="setEndDate" class="w-full bg-gray-50 rounded-lg p-2 text-sm border border-gray-200">
          </div>
        </div>
        
        <div class="border-t border-gray-100 pt-3">
          <div class="flex justify-between items-center mb-2">
            <label class="block text-xs font-bold text-gray-500 flex items-center gap-1">💱 旅程使用幣別</label>
            <span class="text-[9px] text-gray-400">點擊兩次設為預設貨幣(深藍底)</span>
          </div>
          <div id="currencyChipsArea" class="flex flex-wrap gap-2 mb-2"></div>
          <input type="hidden" id="setDefaultCurrency" value="TWD">
          <input type="hidden" id="setCurrencies" value="TWD">
        </div>

        <div id="newRateArea" class="hidden bg-orange-50 border border-orange-100 p-3 rounded-lg">
           <label class="block text-xs font-bold text-orange-800 mb-2">➕ 新增自訂幣別與匯率</label>
           <div class="flex items-center gap-2">
             <input type="text" id="setNewCurCode" maxlength="3" class="w-16 bg-white rounded-lg p-1.5 text-sm font-mono border border-orange-200 text-center uppercase" placeholder="代碼">
             <span class="text-sm font-mono text-orange-700 shrink-0">=</span>
             <input type="text" id="setNewRate" inputmode="decimal" class="flex-1 min-w-0 bg-white rounded-lg p-1.5 text-sm font-mono border border-orange-200 text-right" placeholder="例如：35.2">
             <span class="text-sm font-mono text-orange-700 shrink-0">TWD</span>
             <button type="button" onclick="confirmNewCurrency()" class="bg-orange-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold active:bg-orange-600">確認</button>
           </div>
        </div>
        
        <label id="agreeCloseLabel" class="flex items-start space-x-2 p-3 bg-blue-50 rounded-lg mt-4 border border-blue-100 cursor-pointer transition-opacity">
          <input type="checkbox" id="agreeCloseCb" class="mt-0.5 w-4 h-4 text-blue-600 rounded">
          <span class="text-xs text-blue-800 font-medium leading-relaxed">旅程完成後，我會記得點「結團」封存帳本。</span>
        </label>
      </div>

      <div id="activeSettingsArea" class="mt-4 space-y-3 hidden">
        <button onclick="sendInviteLink()" class="w-full bg-green-50 text-green-700 font-bold rounded-xl py-2 active:bg-green-100 border border-green-200">🔗 重發群組連結</button>
        <button onclick="promptArchiveTrip()" class="w-full bg-red-50 text-red-600 font-bold rounded-xl py-2 active:bg-red-100 border border-red-200">📦 結團封存為唯讀</button>
      </div>
      <div class="pb-24"></div>
    </div>

    <div class="pt-3 px-3 pb-0 flex flex-col h-full overflow-hidden" id="view-add" style="display: none;">
      <div class="h-full bg-white rounded-t-xl shadow-sm border-t border-l border-r border-gray-100 flex flex-col flex-grow overflow-hidden relative">
        
        <div class="p-3 space-y-3 flex-shrink-0 transition-all duration-200" id="addMainArea">
          <div class="flex space-x-3">
            <div class="w-[40%]">
              <label class="block text-xs font-medium text-gray-500 mb-1">付款人</label>
              <select id="payerSelect" class="w-full bg-blue-50 border border-blue-100 rounded-lg h-10 px-2 focus:outline-none text-blue-700 font-bold text-sm truncate shadow-inner"></select>
            </div>
            <div class="w-[60%]">
              <label class="block text-xs font-medium text-gray-500 mb-1">消費項目</label>
              <input type="text" id="descInput" placeholder="例: 扭蛋" class="w-full bg-gray-50 border border-gray-100 rounded-lg h-10 px-3 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-400 text-base shadow-inner transition-all">
            </div>
          </div>
          <div class="flex space-x-3">
            <div class="w-[40%]">
              <label class="flex items-baseline text-xs font-medium text-gray-500 mb-1 whitespace-nowrap">
                幣別 <span id="rateDisplay" class="text-[9px] text-blue-500 ml-1 font-bold"></span>
              </label>
              <select id="currencySelect" class="live-trigger w-full bg-gray-50 border border-gray-100 rounded-lg h-10 px-3 focus:outline-none focus:bg-white text-gray-700 font-bold text-sm shadow-inner"></select>
            </div>
            <div class="w-[60%]">
              <label class="block text-xs font-medium text-gray-500 mb-1">總金額</label>
              <input type="text" id="amountInput" inputmode="decimal" placeholder="0" class="live-trigger font-mono tabular-nums tracking-tight w-full text-xl font-bold text-blue-600 bg-gray-50 border border-gray-100 rounded-lg h-10 px-3 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-400 text-right shadow-inner transition-all">
            </div>
          </div>
        </div>

        <div class="border-t border-gray-50 pt-2.5 px-3 flex-shrink-0" id="splitModeAnchor">
          <label class="block text-xs font-medium text-gray-500 mb-2">分帳模式</label>
          <div id="splitModeButtons" class="grid grid-cols-4 gap-1.5">
            <button type="button" class="split-mode-btn active" data-mode="EQUAL">👥平均</button>
            <button type="button" class="split-mode-btn" data-mode="EXACT">🎯拆分</button>
            <button type="button" class="split-mode-btn" data-mode="SHARE">⚖️份數</button>
            <button type="button" class="split-mode-btn" data-mode="PERCENT">📈比例</button>
          </div>
          <input type="hidden" id="splitModeSelect" value="EQUAL">
        </div>

        <div class="bg-slate-50 border-t border-slate-200 flex flex-col flex-grow min-h-0 mt-3 rounded-t-xl">
          <div class="p-3 pb-2 flex justify-between items-center flex-shrink-0">
            <span class="text-xs font-bold text-gray-600">分帳明細</span>
            <span id="balanceStatus" class="text-[10px] font-bold text-gray-400">請輸入總金額</span>
          </div>
          <div id="splitDetailContainer" class="px-3 pb-32 space-y-1.5 overflow-y-auto flex-grow"></div>
        </div>
      </div>
    </div>

    <div class="flex flex-col h-full overflow-hidden bg-gray-50" id="view-history" style="display: none;">
      <div class="bg-white shadow-sm z-10 flex-shrink-0 pt-2 pb-1">
        
        <div class="px-3 mb-2 flex justify-between items-center border-b border-gray-50 pb-2">
          <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">總計</span>
          <span class="text-base font-bold text-amber-600 font-mono tabular-nums tracking-tight">約 <span id="filteredTotalTwd">0</span> <span class="text-[10px] font-sans text-amber-500">TWD</span></span>
        </div>

        <div class="space-y-2 px-3 pb-1">
          <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-gray-400 uppercase w-10 flex-shrink-0">📅 日期</span>
            <div id="dateFilters" class="flex gap-1.5 overflow-x-auto hide-scrollbar flex-grow"></div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-gray-400 uppercase w-10 flex-shrink-0">💳 付款</span>
            <div id="payerFilters" class="flex gap-1.5 overflow-x-auto hide-scrollbar flex-grow"></div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-gray-400 uppercase w-10 flex-shrink-0">🛍️ 分攤</span>
            <div id="splitterFilters" class="flex gap-1.5 overflow-x-auto hide-scrollbar flex-grow"></div>
          </div>
        </div>
      </div>

      <div class="p-3 flex-grow overflow-y-auto relative z-0">
        <div id="historyListContainer" class="space-y-2 pb-4"></div>
      </div>
    </div>
  </div>

  <div id="bottomBar" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 p-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-50">
    <button id="submitBtn" onclick="submitMainAction()" disabled class="w-full bg-gray-200 text-gray-500 font-bold text-base rounded-xl py-3 shadow-sm transition-all duration-200">
      讀取中...
    </button>
  </div>

  <script>
    const MY_LIFF_ID = "2010297900-38V2U0d0";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_KjMuAXfyZcRcjIJAGDrsxsg8n1KA7ROv_NeiGtzuOtjnvHMEIxAtTzMmCFECwVY/exec";
    
    let currentTripId = null, currentUserProfile = null, currentGroupId = null;
    let MEMBER_LIST = [], GLOBAL_FEE_RATE = 0, CURRENT_RATE = 1.0, ALL_EXPENSES = []; 
    let IS_ARCHIVED = false, IS_DRAFT = false, IS_CREATOR = false;
    let RATE_MATRIX = {}; 
    let currentTab = 'dashboard';

    let selectedDates = ['ALL'], selectedPayers = ['ALL'], selectedSplitters = ['ALL'];
    let localSupportedCurrencies = new Set(), localDefaultCurrency = "TWD";
    let isShowingNewCurrencyInput = false;
    let localCustomRates = {}; // 存放本次登入新增的自訂匯率

    const hapticVibrate = (pattern) => { if (navigator.vibrate) navigator.vibrate(pattern); };
    
    const showToast = (message, type = 'info') => {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const bgColors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-gray-800' };
      const icons = { success: '✅', error: '⚠️', info: 'ℹ️' };
      toast.className = `${bgColors[type]} text-white px-4 py-3 rounded-xl shadow-lg text-sm font-bold flex items-center space-x-2 toast-enter pointer-events-auto`;
      toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
      container.appendChild(toast);
      requestAnimationFrame(() => { toast.classList.add('toast-enter-active'); toast.classList.remove('toast-enter'); });
      setTimeout(() => { toast.classList.add('toast-exit'); toast.classList.remove('toast-enter-active'); setTimeout(() => toast.remove(), 200); }, 3000);
    };

    const bottomBar = document.getElementById('bottomBar');
    const appContainer = document.querySelector('.app-container');
    let restoreMainAreaTimeout;
    
    // V21.2 鍵盤擠壓動態摺疊主軸區 (Dynamic Collapse)
    document.addEventListener('focusin', (e) => { 
  if (e.target.tagName === 'INPUT') { 

    clearTimeout(restoreMainAreaTimeout);

    if (currentTab === 'add') {
      bottomBar.classList.add('btn-hidden');
      appContainer.style.height = '100%';
    }

    if (
      currentTab === 'add' &&
      e.target.closest('#splitDetailContainer')
    ) {

      document
        .getElementById('addMainArea')
        .classList
        .add('hidden');

      setTimeout(() => {

        document
          .getElementById('splitModeAnchor')
          .scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });

      }, 50);

    } else {

      setTimeout(() => {

        e.target.scrollIntoView({
          behavior: 'smooth',
          block: 'end'
        });

      }, 300);

    }

  }
});

    document.addEventListener('focusout', (e) => { 
      restoreMainAreaTimeout = setTimeout(() => { 
        if(document.activeElement.tagName !== 'INPUT') { 
          if (currentTab === 'add') document.getElementById('addMainArea').classList.remove('hidden');
          if (currentTab === 'add' || currentTab === 'settings') { 
            bottomBar.classList.remove('btn-hidden'); 
            appContainer.style.height = 'calc(100% - 76px)'; 
          } 
        } 
      }, 150);
    });

    function throwFatalError(title, desc) {
      document.getElementById('errorModalTitle').innerText = title;
      document.getElementById('errorModalDesc').innerText = desc;
      document.getElementById('errorModal').classList.remove('hidden');
    }

    function switchTab(tab) {
      if (IS_ARCHIVED && tab === 'add') return;
      hapticVibrate(50);
      currentTab = tab;
      ['dashboard', 'add', 'history', 'settings'].forEach(t => {
        const el = document.getElementById(`view-${t}`);
        if(el) el.style.display = t === tab ? 'flex' : 'none';
      });

      document.querySelectorAll('.tab-btn').forEach(btn => {
         if (btn.dataset.tab === tab) { btn.className = 'tab-btn w-1/3 text-center py-2.5 text-blue-600 border-b-2 border-blue-600 cursor-pointer transition-colors bg-white font-bold'; }
         else { btn.className = 'tab-btn w-1/3 text-center py-2.5 text-gray-400 border-b-2 border-transparent cursor-pointer transition-colors font-bold'; }
      });

      if(tab === 'history' || tab === 'dashboard') { 
          bottomBar.classList.add('btn-hidden'); appContainer.style.height = '100%'; 
          if(tab === 'history') renderHistory(); 
      } else { 
          bottomBar.classList.remove('btn-hidden'); appContainer.style.height = 'calc(100% - 76px)'; 
          const btn = document.getElementById('submitBtn');
          if (tab === 'add') { calculateLivePreview(); }
          else if (tab === 'settings') {
            btn.disabled = false; btn.innerText = IS_DRAFT ? "🚀 確認開團並公告" : "💾 儲存修改";
            btn.className = "w-full bg-blue-600 text-white font-bold text-base rounded-xl py-3 shadow-md transition-all active:scale-[0.98]";
          }
      }
    }

    function navigateToTrip(tId) { hapticVibrate(50); window.location.href = `https://liff.line.me/${MY_LIFF_ID}?tripId=${tId}`; }

    function buildFilterHtml(type, list, selectedArr) {
      let html = `<button type="button" onclick="toggleFilter('${type}', 'ALL')" class="flex-shrink-0 filter-btn px-2 py-1 border rounded-md text-[11px] truncate w-12 text-center ${selectedArr.includes('ALL') ? 'active bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-gray-200 text-gray-500'}">全部</button>`;
      list.forEach(item => {
        let display = (type==='date') ? item.slice(5) : item;
        let isActive = selectedArr.includes(item);
        html += `<button type="button" onclick="toggleFilter('${type}', '${item}')" class="flex-shrink-0 filter-btn px-2 py-1 border rounded-md text-[11px] truncate w-14 text-center ${isActive ? 'active bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-gray-200 text-gray-500'}">${display}</button>`;
      });
      return html;
    }

    function toggleFilter(type, value) {
      hapticVibrate(20);
      let targetArr = (type === 'date') ? selectedDates : (type === 'payer') ? selectedPayers : selectedSplitters;
      if (value === 'ALL') { targetArr.length = 0; targetArr.push('ALL'); } 
      else {
        if (targetArr.includes('ALL')) { targetArr.length = 0; }
        let idx = targetArr.indexOf(value);
        if (idx > -1) { targetArr.splice(idx, 1); if(targetArr.length === 0) targetArr.push('ALL'); } 
        else { targetArr.push(value); }
      }
      initHistoryFilters(); renderHistory();
    }

    function initHistoryFilters() {
      const uniqueDates = [...new Set(ALL_EXPENSES.map(e => e.date))].sort();
      document.getElementById('dateFilters').innerHTML = buildFilterHtml('date', uniqueDates, selectedDates);
      document.getElementById('payerFilters').innerHTML = buildFilterHtml('payer', MEMBER_LIST, selectedPayers);
      document.getElementById('splitterFilters').innerHTML = buildFilterHtml('splitter', MEMBER_LIST, selectedSplitters);
    }

    function renderHistory() {
      const container = document.getElementById('historyListContainer');
      let totalTwdSum = 0; let htmlOutput = "";

      ALL_EXPENSES.forEach(exp => {
        let inDate = selectedDates.includes('ALL') || selectedDates.includes(exp.date); 
        let inPayer = selectedPayers.includes('ALL') || selectedPayers.includes(exp.payer);
        let splitObj = {}; try{ splitObj = JSON.parse(exp.splitDetail) }catch(e){}
        let inSplitter = selectedSplitters.includes('ALL') || selectedSplitters.some(m => splitObj[m] !== undefined && Number(splitObj[m]) > 0);

        if (inDate && inPayer && inSplitter) {
          totalTwdSum += exp.twdAmount;
          let splitStr = Object.entries(splitObj).filter(([k,v]) => Number(v)>0).map(([k,v]) => `<span class="text-gray-500">${k}:</span><span class="font-mono tabular-nums text-gray-700">${v}</span>`).join(', ');
          
          htmlOutput += `

    function renderCurrencyChips() {

          html += `<button type="button" onclick="handleChipClick('${c}')" class="chip-btn ${stateClass}">${c}</button>`;
       });
       
       let twdClass = (localDefaultCurrency === 'TWD') ? 'default' : (localSupportedCurrencies.has('TWD') ? 'selected' : '');

    function handleChipClick(currency) {
       hapticVibrate(20);
       if (!localSupportedCurrencies.has(currency)) {
           // White -> Light Blue
           localSupportedCurrencies.add(currency);
       } else if (localSupportedCurrencies.has(currency) && localDefaultCurrency !== currency) {
           // Light Blue -> Dark Blue
           localDefaultCurrency = currency;
       } else if (localDefaultCurrency === currency) {
           // Dark Blue -> White (Remove entirely)
           localSupportedCurrencies.delete(currency);
           localDefaultCurrency = Array.from(localSupportedCurrencies)[0] || 'TWD';
           if (!localSupportedCurrencies.has(localDefaultCurrency)) localSupportedCurrencies.add(localDefaultCurrency);
       }
       renderCurrencyChips();
    }

    function calculateLivePreview() {
      const rawAmount = parseFloat(document.getElementById('amountInput').value) || 0; const currency = document.getElementById('currencySelect').value; const mode = document.getElementById('splitModeSelect').value;
      const btn = document.getElementById('submitBtn'); const statusBar = document.getElementById('balanceStatus'); const rows = document.getElementById('splitDetailContainer').children;
      
      btn.disabled = true; btn.className = "w-full bg-gray-200 text-gray-500 font-bold text-base rounded-xl py-3 shadow-sm transition-all duration-200";
      
      if (rawAmount <= 0) { 
        statusBar.innerHTML = `<span class="text-gray-400">請輸入總金額</span>`; btn.innerText = "🔒 請輸入有效金額"; 
        Array.from(rows).forEach(row => { const res = row.querySelector('.live-result'); if(res) res.innerText = ""; }); 
        return; 
      }

      if (mode === "EQUAL") {
        const checked = document.querySelectorAll('.split-checkbox:checked'); if (checked.length === 0) { statusBar.innerHTML = `<span class="text-red-500">❌ 至少需一人</span>`; btn.innerText = "🔒 需選擇分帳對象"; return; }
        let base = Math.floor(rawAmount / checked.length); let residue = rawAmount - (base * checked.length); let cIdx = 0;
        Array.from(rows).forEach(row => { const cb = row.querySelector('.split-checkbox'); const res = row.querySelector('.live-result'); if (cb && cb.checked) { let val = base + (cIdx === checked.length - 1 ? residue : 0); res.innerText = `${val.toLocaleString()}`; cIdx++; } else if (res) { res.innerText = "-"; } });
        statusBar.innerHTML = `<span class="text-green-600">✅ 均分完成</span>`; btn.disabled = false; btn.innerText = "💾 儲存並同步至群組"; btn.classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-700', 'active:scale-[0.98]', 'shadow-md'); btn.classList.remove('bg-gray-200', 'text-gray-500');
      } 
      else if (mode === "EXACT") {
        let currentForeignSum = 0; document.querySelectorAll('.split-input').forEach(input => currentForeignSum += (parseFloat(input.value) || 0)); let diff = rawAmount - currentForeignSum;
        
        if (Math.abs(diff) < 0.1) { statusBar.innerHTML = `<span class="text-green-600">✅ 帳目平衡</span>`; btn.disabled = false; btn.innerText = "💾 儲存並同步至群組"; btn.classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-700', 'active:scale-[0.98]', 'shadow-md'); btn.classList.remove('bg-gray-200', 'text-gray-500'); } 
        else if (diff > 0) { statusBar.innerHTML = `<span class="text-blue-500">尚差 ${diff.toFixed(0)} ${currency}</span>`; btn.innerText = `🔒 尚差 ${diff.toFixed(0)}`; } 
        else { statusBar.innerHTML = `<span class="text-red-500">❌ 超出 ${Math.abs(diff).toFixed(0)} ${currency}</span>`; btn.innerText = `🔒 金額超出`; }
      }
      else if (mode === "SHARE" || mode === "PERCENT") {
        let totalMetric = 0; document.querySelectorAll('.split-input').forEach(input => totalMetric += (parseFloat(input.value) || 0));
        if (mode === "SHARE" && totalMetric <= 0) { statusBar.innerHTML = `<span class="text-red-500">❌ 總份數為 0</span>`; return; }
        
        if (mode === "PERCENT") {
            if (Math.abs(totalMetric - 100) > 0.01) { 
                statusBar.innerHTML = `<span class="text-blue-500">目前計 ${totalMetric}%</span>`; btn.innerText = `🔒 比例須等於 100%`; 
                if(totalMetric > 100) { statusBar.innerHTML = `<span class="text-red-500">❌ 超出 ${totalMetric}%</span>`; }
                return; 
            }
        }

        let calculatedSum = 0; let inputs = document.querySelectorAll('.split-input');
        inputs.forEach((input, idx) => { let val = parseFloat(input.value) || 0; let assigned = Math.floor(rawAmount * (val / totalMetric)); calculatedSum += assigned; if (idx === inputs.length - 1) assigned += (rawAmount - calculatedSum); const res = input.closest('div.flex.items-center.justify-between').querySelector('.live-result'); if(res) res.innerText = `${assigned.toLocaleString()}`; });
        statusBar.innerHTML = `<span class="text-green-600">✅ 換算完成</span>`; btn.disabled = false; btn.innerText = "💾 儲存並同步至群組"; btn.classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-700', 'active:scale-[0.98]', 'shadow-md'); btn.classList.remove('bg-gray-200', 'text-gray-500');
      }
    }

    const payload = {
      action: "registerUser",
      tripId: currentTripId,
      userId: currentUserProfile.userId,
      realName: nickname
    };

    const res =
      await fetch(
        GAS_WEB_APP_URL,
        {
          method: 'POST',
          body: JSON.stringify(payload)
        }
      );

    const result =
      await res.json();

    if (
      result.status === "success"
    ) {

      showToast(
        "註冊成功",
        "success"
      );

      setTimeout(
        () => window.location.reload(),
        500
      );

    } else {

      throw new Error(
        result.message
      );

    }

  } catch (e) {

    showToast(
      e.message,
      "error"
    );

    btn.disabled = false;
    btn.innerText =
      "完成註冊並進入";

  }
}
    
    async function initializeLiff() {
      const statusLight = document.getElementById('statusLight');
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) return liff.login();

        const urlParams = new URLSearchParams(window.location.search);
        currentTripId = urlParams.get('tripId') || "null"; currentGroupId = liff.getContext()?.groupId || "ONLINE_TEST"; currentUserProfile = await liff.getProfile();

        const payload = { action: "initWeb", tripId: currentTripId, groupId: currentGroupId, userId: currentUserProfile.userId };
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();

        statusLight.classList.replace('bg-yellow-400', 'bg-green-500'); statusLight.classList.remove('animate-pulse');

        if (result.status === "error") { throwFatalError("存取遭拒", result.message); return; }

        const renderTripCard = (t, statusClass, statusText) => `
          <div onclick="navigateToTrip('${t.id}')" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md active:scale-[0.98] transition-all relative group overflow-hidden">
            <div class="absolute inset-0 bg-blue-50 opacity-0 group-active:opacity-100 transition-opacity"></div>
            <div class="relative z-10 flex justify-between items-start mb-1">
              <span class="font-bold text-base text-gray-800 tracking-tight">${t.name}</span>
              <span class="text-[10px] ${statusClass} px-2 py-0.5 rounded font-bold shadow-sm">${statusText}</span>
            </div>
            <div class="relative z-10 text-[10px] text-gray-400 mb-2 font-mono tracking-tight">${t.dateRange}</div>
            <div class="relative z-10 flex space-x-3 text-[11px] font-bold text-gray-500 border-t border-gray-50 pt-2">
              <span class="flex items-center">👥 <span class="ml-1 font-mono">${t.memberCount}</span></span>
              <span class="flex items-center">📝 <span class="ml-1 font-mono">${t.expenseCount}</span></span>
            </div>
          </div>
        `;

        if (result.status === "dashboard") {
          document.getElementById('tripNameDisplay').innerText = `總控台 (Hi, ${result.suggestedName || currentUserProfile.displayName})`;
          
          let html = result.activeTrips.length === 0 ? `<p class="text-sm text-gray-400 text-center py-6">目前無進行中的旅程</p>` : result.activeTrips.map(t => renderTripCard(t, "bg-green-50 text-green-600 border border-green-100", "記錄中")).join('');
          if (result.canCreate) {
             html = `<button onclick="switchTab('settings')" class="w-full bg-blue-50 border border-blue-200 text-blue-600 font-bold rounded-xl py-3 mb-4 shadow-sm active:bg-blue-100 transition-colors flex items-center justify-center gap-2"><span>➕</span> 建立新旅程</button>` + html;
             IS_CREATOR = true; IS_DRAFT = true; 
          }
          document.getElementById('dashboardActive').innerHTML = html;
          document.getElementById('dashboardArchived').innerHTML = result.archivedTrips.length === 0 ? `<p class="text-sm text-gray-400 text-center py-6">無歷史封存記錄</p>` : result.archivedTrips.map(t => renderTripCard(t, "bg-gray-100 text-gray-500 border border-gray-200", "歷史封存")).join('');
          
          switchTab('dashboard'); return;
        }

        if (result.status === "success") {
          if (!result.isRegistered && result.tripStatus !== 'DRAFT') { 
            if(result.suggestedName) document.getElementById('realNameInput').value = result.suggestedName; 
            document.querySelector('#registrationModal p').innerText = "請設定群組內可辨識的暱稱（限 5 個字以內）。";
            document.getElementById('registrationModal').classList.remove('hidden'); return; 
          }
          
          IS_ARCHIVED = (result.tripStatus === 'ARCHIVED');
          IS_DRAFT = (result.tripStatus === 'DRAFT');
          IS_CREATOR = result.isCreator;
          RATE_MATRIX = result.rateMatrix || {}; 
          GLOBAL_FEE_RATE = result.feeRate || 0; 
          
          MEMBER_LIST = result.members || []; ALL_EXPENSES = result.expenses || []; 

          let tabsHtml = '';
          if (!IS_DRAFT) {
             tabsHtml += `<div data-tab="add" onclick="switchTab('add')" class="tab-btn w-1/3 text-center py-2.5 text-gray-400 border-b-2 border-transparent cursor-pointer transition-colors font-bold">✏️ 記一筆帳</div>`;
             tabsHtml += `<div data-tab="history" onclick="switchTab('history')" class="tab-btn w-1/3 text-center py-2.5 text-gray-400 border-b-2 border-transparent cursor-pointer transition-colors font-bold">📜 帳務明細</div>`;
          }
          if (IS_CREATOR || IS_DRAFT) {
             tabsHtml += `<div data-tab="settings" onclick="switchTab('settings')" class="tab-btn ${IS_DRAFT ? 'w-full' : 'w-1/3'} text-center py-2.5 text-gray-400 border-b-2 border-transparent cursor-pointer transition-colors font-bold">⚙️ 旅程管理</div>`;
          }
          document.getElementById('tabContainer').innerHTML = tabsHtml;

          if (IS_CREATOR || IS_DRAFT) {
             document.getElementById('setTripName').value = result.tripName || "";
             if(result.startDate) document.getElementById('setStartDate').value = result.startDate.replace(/\//g, '-');
             if(result.endDate) document.getElementById('setEndDate').value = result.endDate.replace(/\//g, '-');
             
             let curStr = result.currenciesStr || "TWD";
             localSupportedCurrencies = new Set(curStr.split(',').map(s=>s.trim().toUpperCase()));
             localDefaultCurrency = result.defaultCurrency || "TWD";
             renderCurrencyChips();
             
             if(!IS_DRAFT) {
                document.getElementById('activeSettingsArea').classList.remove('hidden');
                const cb = document.getElementById('agreeCloseCb');
                const label = document.getElementById('agreeCloseLabel');
                cb.checked = true; cb.disabled = true;
                label.classList.add('opacity-50', 'pointer-events-none');
             }
          }

          if (IS_DRAFT) {
             document.getElementById('tripNameDisplay').innerText = `✏️ 建立新旅程 (草稿)`;
             document.getElementById('tabContainer').style.display = 'flex';
             switchTab('settings'); return;
          }

          CURRENT_RATE = RATE_MATRIX[localDefaultCurrency] || 1.0;
          const payerSel = document.getElementById('payerSelect');
          payerSel.innerHTML = MEMBER_LIST.map(m => `<option value="${m}">${m}</option>`).join('');
          if (result.suggestedName && MEMBER_LIST.includes(result.suggestedName)) { payerSel.value = result.suggestedName; }
          
          const curSelect = document.getElementById('currencySelect');
          curSelect.innerHTML = Array.from(localSupportedCurrencies).map(c => `<option value="${c}">${c}</option>`).join('');
          curSelect.value = localDefaultCurrency; 

          document.getElementById('rateDisplay').innerText = `(1 : ${CURRENT_RATE} TWD)`;
          document.getElementById('tripNameDisplay').innerHTML =
            `${IS_ARCHIVED ? '📦' : '✈️'} ${result.tripName}
             <span class="text-[11px] text-gray-400 font-normal ml-1">
               ${result.startDate} ~ ${result.endDate}
             </span>`;
          
          document.getElementById('tabContainer').style.display = 'flex';
          initHistoryFilters(); renderSplitDetailAdd(); 
          
          if (IS_ARCHIVED) { document.getElementById('tab-add').style.display = 'none'; switchTab('history'); } 
          else { switchTab('add'); }
        } else throw new Error(result.message || "連線失敗");
      } catch (err) { statusLight.classList.replace('bg-yellow-400', 'bg-red-500'); statusLight.classList.remove('animate-pulse'); showToast("系統阻斷：" + err.message, "error"); hapticVibrate([50, 50, 50]); }
    }

    initializeLiff();
  </script>
</body>
