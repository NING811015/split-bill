<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>NoMad Split</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    html, body { height: 100%; overflow: hidden; background-color: #f9fafb; }
    .app-container { height: calc(100% - 76px); display: flex; flex-direction: column; }
    .btn-hidden { display: none !important; }
    .filter-cb:checked + div { background-color: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; font-weight: 700; box-shadow: inset 0 0 0 1px #BFDBFE; }
    .modal-overlay { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(2px); }
    .toast-enter { transform: translateY(-100%); opacity: 0; }
    .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .toast-exit { transform: translateY(-20%); opacity: 0; transition: all 0.2s ease-in; }
    .split-mode-btn { height:40px; background:#F9FAFB; border:1px solid #E5E7EB; border-radius:10px; font-size:12px; font-weight:600; color:#6B7280; transition:all .15s; }
    .split-mode-btn.active { background:#EEF4FF; border-color:#3B82F6; color:#2563EB;}
    .split-mode-btn:active { transform:scale(.97);}
  </style>
</head>
<body class="text-gray-800 font-sans relative">

  <div id="toastContainer" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[200] flex flex-col space-y-2 w-[90%] max-w-sm pointer-events-none"></div>

  <div id="registrationModal" class="absolute inset-0 z-[100] bg-gray-900 bg-opacity-95 flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center space-y-4">
      <div class="text-4xl">👋</div>
      <h2 class="text-xl font-bold text-gray-800">歡迎加入旅程</h2>
      <p class="text-sm text-gray-500">系統偵測到您是初次使用，請設定群組內可辨識的暱稱（限 6 個字以內）。</p>
      <input type="text" id="realNameInput" maxlength="6" placeholder="請輸入暱稱" class="w-full bg-gray-50 border border-gray-100 rounded-lg p-3 text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-inner">
      <button id="registerBtn" onclick="submitRegistration()" class="w-full bg-blue-600 text-white font-bold rounded-xl py-3 active:bg-blue-700 shadow-md transition-transform active:scale-[0.98]">完成註冊並進入</button>
    </div>
  </div>

  <div id="deleteModal" class="absolute inset-0 z-[90] modal-overlay flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl space-y-4 transform transition-all">
      <h3 class="text-lg font-bold text-red-600 flex items-center">⚠️ 確認撤銷帳目？</h3>
      <p class="text-sm text-gray-600 font-mono tabular-nums tracking-tight whitespace-pre-line" id="deleteTargetDesc"></p>
      <div class="flex space-x-3 pt-2">
        <button onclick="closeDeleteModal()" class="w-1/2 bg-gray-100 text-gray-700 font-bold rounded-xl py-2.5 active:bg-gray-200 transition-colors">取消</button>
        <button id="confirmDeleteBtn" class="w-1/2 bg-red-500 text-white font-bold rounded-xl py-2.5 shadow-md active:bg-red-600 transition-transform active:scale-[0.98]">確定撤銷</button>
      </div>
    </div>
  </div>

  <div class="app-container" id="scrollArea">
    <div class="bg-white shadow-sm flex flex-col sticky top-0 z-10 flex-shrink-0">
      <div class="p-3 flex items-center justify-between">
        <h1 class="text-base font-bold text-gray-800" id="tripNameDisplay">連線中...</h1>
        <div id="statusLight" class="w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse shadow-sm"></div>
      </div>
      <div class="flex text-sm font-bold border-t border-gray-100 bg-gray-50/50" id="tabContainer" style="display: none;">
        <div id="tab-add" onclick="switchTab('add')" class="w-1/2 text-center py-2.5 text-blue-600 border-b-2 border-blue-600 cursor-pointer transition-colors">✏️ 記一筆帳</div>
        <div id="tab-history" onclick="switchTab('history')" class="w-1/2 text-center py-2.5 text-gray-400 border-b-2 border-transparent cursor-pointer transition-colors">📜 記帳明細</div>
      </div>
    </div>

    <div class="p-4 flex flex-col h-full overflow-y-auto bg-gray-50/80" id="view-dashboard" style="display: none;">
      <h2 class="text-lg font-bold text-gray-800 mb-4">🚀 我的旅程總覽</h2>
      <div id="dashboardActive" class="space-y-4 mb-6"></div>
      <h2 class="text-sm font-bold text-gray-500 mb-3 border-t border-gray-200 pt-4">🔒 歷史封存</h2>
      <div id="dashboardArchived" class="space-y-4"></div>
    </div>

    <div class="pt-3 px-3 pb-0 flex flex-col h-full overflow-hidden" id="view-add" style="display: none;">
      <div class="h-full bg-white rounded-t-xl shadow-sm border-t border-l border-r border-gray-100 flex flex-col flex-grow overflow-hidden">
        <div class="p-3 space-y-3 flex-shrink-0">
          <div class="flex space-x-3">
            <div class="w-[40%]">
              <label class="block text-xs font-medium text-gray-500 mb-1">付款人</label>
              <select id="payerSelect" class="w-full bg-blue-50 border border-blue-100 rounded-lg h-10 px-2 focus:outline-none text-blue-700 font-bold text-sm truncate shadow-inner"></select>
            </div>
            <div class="w-[60%]">
              <label class="block text-xs font-medium text-gray-500 mb-1">消費項目</label>
              <input type="text" id="descInput" placeholder="例: 扭蛋" class="w-full bg-gray-50 border border-gray-100 rounded-lg h-10 px-3 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-400 text-base shadow-inner transition-all">
            </div>
          </div>
          <div class="flex space-x-3">
            <div class="w-[40%]">
              <label class="flex items-baseline text-xs font-medium text-gray-500 mb-1 whitespace-nowrap">
                幣別 <span id="rateDisplay" class="text-[9px] text-blue-500 ml-1 font-bold"></span>
              </label>
              <select id="currencySelect" class="live-trigger w-full bg-gray-50 border border-gray-100 rounded-lg h-10 px-3 focus:outline-none focus:bg-white text-gray-700 font-bold text-sm shadow-inner"></select>
            </div>
            <div class="w-[60%]">
              <label class="block text-xs font-medium text-gray-500 mb-1">總金額</label>
              <input type="text" id="amountInput" inputmode="decimal" placeholder="0" class="live-trigger font-mono tabular-nums tracking-tight w-full text-xl font-bold text-blue-600 bg-gray-50 border border-gray-100 rounded-lg h-10 px-3 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-400 text-right shadow-inner transition-all">
            </div>
          </div>
          <div class="border-t border-gray-50 pt-2.5 mt-1">
            <label class="block text-xs font-medium text-gray-500 mb-2">分帳模式</label>
            <div id="splitModeButtons" class="grid grid-cols-4 gap-1.5">
              <button type="button" class="split-mode-btn active" data-mode="EQUAL">👥平均</button>
              <button type="button" class="split-mode-btn" data-mode="EXACT">🎯拆分</button>
              <button type="button" class="split-mode-btn" data-mode="SHARE">⚖️份數</button>
              <button type="button" class="split-mode-btn" data-mode="PERCENT">📈比例</button>
            </div>
            <input type="hidden" id="splitModeSelect" value="EQUAL">
          </div>
        </div>

        <div class="bg-gray-50/50 border-t border-gray-100 flex flex-col flex-grow min-h-0">
          <div class="p-3 pb-2 flex justify-between items-center flex-shrink-0">
            <span class="text-xs font-bold text-gray-600">分帳明細預覽</span>
            <span id="balanceStatus" class="text-[10px] font-bold text-gray-400">請輸入總金額</span>
          </div>
          <div id="splitDetailContainer" class="px-3 pb-24 space-y-1.5 overflow-y-auto flex-grow"></div>
        </div>
      </div>
    </div>

    <div class="flex flex-col h-full overflow-hidden bg-gray-50" id="view-history" style="display: none;">
      <div class="p-3 bg-white shadow-sm z-10 flex-shrink-0 space-y-3">
        <div><span class="text-[10px] font-bold text-gray-400 mb-1.5 block uppercase tracking-wider">📅 日期</span><div id="dateFilters" class="flex flex-wrap gap-2"></div></div>
        <div><span class="text-[10px] font-bold text-gray-400 mb-1.5 block uppercase tracking-wider">💳 付款人</span><div id="payerFilters" class="flex flex-wrap gap-2"></div></div>
        <div><span class="text-[10px] font-bold text-gray-400 mb-1.5 block uppercase tracking-wider">🛍️ 分攤人</span><div id="splitterFilters" class="flex flex-wrap gap-2"></div></div>
        
        <div class="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-100 rounded-lg py-1.5 px-3 flex justify-between items-center shadow-sm">
          <span class="text-xs font-bold text-blue-800">條件加總</span>
          <span class="text-lg font-bold text-blue-600 font-mono tabular-nums tracking-tight">約 <span id="filteredTotalTwd">0</span> <span class="text-[11px] font-sans text-blue-400">TWD</span></span>
        </div>
      </div>
      <div class="p-3 flex-grow overflow-y-auto relative z-0">
        <div id="historyListContainer" class="space-y-2 pb-4"></div>
      </div>
    </div>
  </div>

  <div id="bottomBar" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 p-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-50">
    <button id="submitBtn" onclick="submitExpense()" disabled class="w-full bg-gray-200 text-gray-500 font-bold text-base rounded-xl py-3 shadow-sm transition-all duration-200">
      🔒 請先輸入有效金額
    </button>
  </div>

  <script>
    const MY_LIFF_ID = "2010297900-38V2U0d0";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_KjMuAXfyZcRcjIJAGDrsxsg8n1KA7ROv_NeiGtzuOtjnvHMEIxAtTzMmCFECwVY/exec";
    
    let currentTripId = null, currentUserProfile = null, currentGroupId = null;
    let MEMBER_LIST = [], GLOBAL_FEE_RATE = 0, CURRENT_RATE = 1.0, ALL_EXPENSES = []; 
    let IS_ARCHIVED = false;
    let RATE_MATRIX = {}; 

    const hapticVibrate = (pattern) => { if (navigator.vibrate) navigator.vibrate(pattern); };
    
    const showToast = (message, type = 'info') => {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const bgColors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-gray-800' };
      const icons = { success: '✅', error: '⚠️', info: 'ℹ️' };
      
      toast.className = `${bgColors[type]} text-white px-4 py-3 rounded-xl shadow-lg text-sm font-bold flex items-center space-x-2 toast-enter pointer-events-auto`;
      toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
      container.appendChild(toast);
      
      requestAnimationFrame(() => { toast.classList.add('toast-enter-active'); toast.classList.remove('toast-enter'); });
      setTimeout(() => {
        toast.classList.add('toast-exit'); toast.classList.remove('toast-enter-active');
        setTimeout(() => toast.remove(), 200);
      }, 3000);
    };

    const bottomBar = document.getElementById('bottomBar');
    const appContainer = document.querySelector('.app-container');
    
    // V20.4 視圖導航：確保輸入框聚焦時被滾動至可視區域
    document.addEventListener('focusin', (e) => { 
      if (e.target.tagName === 'INPUT') { 
        bottomBar.classList.add('btn-hidden'); 
        appContainer.style.height = '100%'; 
        setTimeout(() => { e.target.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 150);
      }
    });
    document.addEventListener('focusout', (e) => { 
      setTimeout(() => { 
        if(document.activeElement.tagName !== 'INPUT' && document.getElementById('view-add').style.display !== 'none') { 
          bottomBar.classList.remove('btn-hidden'); 
          appContainer.style.height = 'calc(100% - 76px)'; 
        } 
      }, 100);
    });

    function switchTab(tab) {
      if (IS_ARCHIVED && tab === 'add') return;
      hapticVibrate(50);
      document.getElementById('view-add').style.display = tab === 'add' ? 'flex' : 'none';
      document.getElementById('view-history').style.display = tab === 'history' ? 'flex' : 'none';
      document.getElementById('tab-add').className = tab === 'add' ? 'w-1/2 text-center py-2.5 text-blue-600 border-b-2 border-blue-600 cursor-pointer transition-colors bg-white' : 'w-1/2 text-center py-2.5 text-gray-400 border-b-2 border-transparent cursor-pointer transition-colors';
      document.getElementById('tab-history').className = tab === 'history' ? 'w-1/2 text-center py-2.5 text-blue-600 border-b-2 border-blue-600 cursor-pointer transition-colors bg-white' : 'w-1/2 text-center py-2.5 text-gray-400 border-b-2 border-transparent cursor-pointer transition-colors';
      if(tab === 'history') { bottomBar.classList.add('btn-hidden'); appContainer.style.height = '100%'; renderHistory(); } 
      else { bottomBar.classList.remove('btn-hidden'); appContainer.style.height = 'calc(100% - 76px)'; }
    }

    function navigateToTrip(tId) { hapticVibrate(50); window.location.href = `https://liff.line.me/${MY_LIFF_ID}?tripId=${tId}`; }

    function initHistoryFilters() {
      const uniqueDates = [...new Set(ALL_EXPENSES.map(e => e.date))].sort();
      document.getElementById('dateFilters').innerHTML = uniqueDates.map(d => `<label class="relative cursor-pointer"><input type="checkbox" value="${d}" class="filter-cb filter-date hidden" checked onchange="renderHistory()"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 text-gray-500 text-[11px] rounded-md transition-colors active:scale-95 transform">${d.slice(5)}</div></label>`).join('');
      document.getElementById('payerFilters').innerHTML = MEMBER_LIST.map(m => `<label class="relative cursor-pointer"><input type="checkbox" value="${m}" class="filter-cb filter-payer hidden" checked onchange="renderHistory()"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 text-gray-500 text-[11px] rounded-md transition-colors active:scale-95 transform">${m}</div></label>`).join('');
      document.getElementById('splitterFilters').innerHTML = MEMBER_LIST.map(m => `<label class="relative cursor-pointer"><input type="checkbox" value="${m}" class="filter-cb filter-splitter hidden" checked onchange="renderHistory()"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 text-gray-500 text-[11px] rounded-md transition-colors active:scale-95 transform">${m}</div></label>`).join('');
    }

    function renderHistory() {
      const selectedDates = Array.from(document.querySelectorAll('.filter-date:checked')).map(cb => cb.value);
      const selectedPayers = Array.from(document.querySelectorAll('.filter-payer:checked')).map(cb => cb.value);
      const selectedSplitters = Array.from(document.querySelectorAll('.filter-splitter:checked')).map(cb => cb.value);
      const container = document.getElementById('historyListContainer');
      let totalTwdSum = 0; let htmlOutput = "";

      ALL_EXPENSES.forEach(exp => {
        let inDate = selectedDates.includes(exp.date); let inPayer = selectedPayers.includes(exp.payer);
        let splitObj = {}; try{ splitObj = JSON.parse(exp.splitDetail) }catch(e){}
        let inSplitter = selectedSplitters.some(m => splitObj[m] !== undefined && Number(splitObj[m]) > 0);

        if (inDate && inPayer && inSplitter) {
          totalTwdSum += exp.twdAmount;
          let splitStr = Object.entries(splitObj).filter(([k,v]) => Number(v)>0).map(([k,v]) => `<span class="text-gray-500">${k}:</span><span class="font-mono tabular-nums text-gray-700">${v}</span>`).join(', ');
          
          // V20.4 優化：拔除 truncate，改用 whitespace-normal 讓名單自然換行
          htmlOutput += `
            <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex flex-col gap-1.5 relative hover:shadow-md transition-shadow">
              <div class="flex justify-between items-start pr-8">
                <div class="flex items-center gap-2">
                  <span class="text-[10px] font-bold text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded border border-gray-200">${exp.date.slice(5)}</span>
                  <h4 class="text-sm font-bold text-gray-800">${exp.desc}</h4>
                </div>
                <div class="text-sm font-bold text-blue-600 font-mono tabular-nums whitespace-nowrap">${exp.rawAmount.toLocaleString()} <span class="text-[10px] text-blue-400 font-sans">${exp.currency}</span></div>
              </div>
              <div class="flex justify-between items-end pr-8 mt-1">
                <div class="text-[11px] text-gray-500 whitespace-normal break-words leading-relaxed">
                  <span class="font-bold text-gray-700">${exp.payer}</span> 先墊款<br>
                  <span class="text-gray-400">${splitStr}</span>
                </div>
                <div class="text-[10px] text-gray-400 font-mono tabular-nums text-right whitespace-nowrap">約 ${exp.twdAmount.toLocaleString()} TWD</div>
              </div>
              ${!IS_ARCHIVED ? `<button onclick="promptDelete('${exp.id}', '${exp.date}', '${exp.desc}', ${exp.rawAmount}, '${exp.currency}', '${exp.tripId}')" class="absolute top-1/2 -translate-y-1/2 right-1 text-gray-300 hover:text-red-500 p-2 active:bg-red-50 rounded-lg transition-colors">🗑️</button>` : ''}
            </div>
          `;
        }
      });
      if (htmlOutput === "") htmlOutput = `<div class="text-center text-sm text-gray-400 py-6">查無交集條件之帳目</div>`;
      container.innerHTML = htmlOutput; document.getElementById('filteredTotalTwd').innerText = totalTwdSum.toLocaleString();
    }

    let pendingDeleteId = null, pendingTripId = null;
    // V20.4 傳入 exp.date 供通知使用
    function promptDelete(id, date, desc, amount, currency, tripId) {
      hapticVibrate([50, 50]);
      pendingDeleteId = id; pendingTripId = tripId;
      document.getElementById('deleteTargetDesc').innerText = `日期：${date}\n項目：${desc}\n金額：${amount.toLocaleString()} ${currency}`;
      document.getElementById('deleteModal').classList.remove('hidden'); document.getElementById('confirmDeleteBtn').onclick = executeDelete;
    }
    function closeDeleteModal() { pendingDeleteId = null; pendingTripId = null; document.getElementById('deleteModal').classList.add('hidden'); }
    async function executeDelete() {
      if(!pendingDeleteId) return;
      hapticVibrate(50);
      document.getElementById('confirmDeleteBtn').innerText = "處理中..."; document.getElementById('confirmDeleteBtn').disabled = true;
      try {
        const payload = { action: "deleteExpense", expenseId: pendingDeleteId, userId: currentUserProfile.userId, tripId: pendingTripId };
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "success") {
           showToast("撤銷成功，同步至群組", "success");
           let targetDesc = document.getElementById('deleteTargetDesc').innerText;
           // V20.4 撤銷通知語義化
           await liff.sendMessages([{ type: 'text', text: `🗑️ ${currentUserProfile.displayName} 撤銷了一筆帳目\n\n${targetDesc}` }]);
           setTimeout(() => liff.closeWindow(), 1000); 
        } else throw new Error();
      } catch(e) { showToast("無權限或撤銷失敗", "error"); hapticVibrate([50, 50, 50]); closeDeleteModal(); document.getElementById('confirmDeleteBtn').innerText = "確定撤銷"; document.getElementById('confirmDeleteBtn').disabled = false; }
    }

    document.getElementById('view-add').addEventListener('input', function(e) { if (e.target.classList.contains('live-trigger') || e.target.classList.contains('split-input') || e.target.classList.contains('split-checkbox')) { if (e.target.id === 'splitModeSelect' || e.target.id === 'currencySelect') renderSplitDetailAdd(); calculateLivePreview(); }});
    document.getElementById('currencySelect').addEventListener('change', function(e) { CURRENT_RATE = RATE_MATRIX[e.target.value] || 1.0; document.getElementById('rateDisplay').innerText = `(1 : ${CURRENT_RATE} TWD)`; renderSplitDetailAdd(); calculateLivePreview();});
    function toggleCheckbox(rowElement) { const cb = rowElement.querySelector('.split-checkbox'); if (cb) { cb.checked = !cb.checked; hapticVibrate(20); calculateLivePreview(); } }

    function renderSplitDetailAdd() {
      const mode = document.getElementById('splitModeSelect').value; const currency = document.getElementById('currencySelect').value;
      const container = document.getElementById('splitDetailContainer'); container.innerHTML = ""; if (MEMBER_LIST.length === 0) return;

      MEMBER_LIST.forEach(name => {
        const row = document.createElement('div'); row.className = "flex items-center justify-between bg-white border border-gray-100 h-10 px-3 rounded-lg shadow-sm transition-colors"; let inputHtml = "";
        if (mode === "EQUAL") { 
          row.setAttribute('onclick', 'toggleCheckbox(this)'); row.classList.add('cursor-pointer', 'active:bg-blue-50'); 
          inputHtml = `<div class="flex items-center space-x-3"><span class="live-result text-xs font-bold text-blue-500 w-16 text-right font-mono tabular-nums tracking-tight"></span><input type="checkbox" data-name="${name}" class="split-checkbox w-5 h-5 text-blue-600 rounded border-gray-300 pointer-events-none" checked></div>`; 
        } 
        else if (mode === "EXACT") { 
          inputHtml = `<div class="flex items-center"><input type="text" data-name="${name}" inputmode="decimal" placeholder="0" class="split-input live-trigger w-20 text-right bg-gray-50 border border-gray-200 rounded h-7 px-2 text-sm focus:outline-none focus:bg-white focus:border-blue-400 font-mono tabular-nums transition-colors"><span class="text-[10px] text-gray-400 ml-1 w-6">${currency}</span></div>`; 
        } 
        else if (mode === "SHARE") { 
          inputHtml = `<div class="flex items-center space-x-2"><span class="live-result text-xs font-bold text-blue-500 w-14 text-right font-mono tabular-nums tracking-tight"></span><div class="flex items-center"><input type="text" data-name="${name}" inputmode="decimal" value="1" class="split-input live-trigger w-12 text-center bg-gray-50 border border-gray-200 rounded h-7 px-2 text-sm focus:outline-none focus:bg-white focus:border-blue-400 font-mono tabular-nums transition-colors"><span class="text-[10px] text-gray-400 ml-1">份</span></div></div>`; 
        } 
        else if (mode === "PERCENT") { 
          inputHtml = `<div class="flex items-center space-x-2"><span class="live-result text-xs font-bold text-blue-500 w-14 text-right font-mono tabular-nums tracking-tight"></span><div class="flex items-center"><input type="text" data-name="${name}" inputmode="decimal" placeholder="0" class="split-input live-trigger w-12 text-right bg-gray-50 border border-gray-200 rounded h-7 px-2 text-sm focus:outline-none focus:bg-white focus:border-blue-400 font-mono tabular-nums transition-colors"><span class="text-[10px] text-gray-400 ml-1">%</span></div></div>`; 
        }
        row.innerHTML = `<span class="text-sm font-medium text-gray-700 pointer-events-none">${name}</span>${inputHtml}`; container.appendChild(row);
      });
    }

    function calculateLivePreview() {
      const rawAmount = parseFloat(document.getElementById('amountInput').value) || 0; const currency = document.getElementById('currencySelect').value; const mode = document.getElementById('splitModeSelect').value;
      const btn = document.getElementById('submitBtn'); const statusBar = document.getElementById('balanceStatus'); const rows = document.getElementById('splitDetailContainer').children;
      
      btn.disabled = true; btn.className = "w-full bg-gray-200 text-gray-500 font-bold text-base rounded-xl py-3 shadow-sm transition-all duration-200";
      
      if (rawAmount <= 0) { 
        statusBar.innerHTML = `<span class="text-gray-400">請輸入總金額</span>`; btn.innerText = "🔒 請先輸入有效金額"; 
        Array.from(rows).forEach(row => { const res = row.querySelector('.live-result'); if(res) res.innerText = ""; }); 
        return; 
      }

      if (mode === "EQUAL") {
        const checked = document.querySelectorAll('.split-checkbox:checked'); if (checked.length === 0) { statusBar.innerHTML = `<span class="text-red-500">❌ 至少需一人</span>`; btn.innerText = "🔒 需選擇分帳對象"; return; }
        let base = Math.floor(rawAmount / checked.length); let residue = rawAmount - (base * checked.length); let cIdx = 0;
        Array.from(rows).forEach(row => { const cb = row.querySelector('.split-checkbox'); const res = row.querySelector('.live-result'); if (cb && cb.checked) { let val = base + (cIdx === checked.length - 1 ? residue : 0); res.innerText = `${val.toLocaleString()}`; cIdx++; } else if (res) { res.innerText = "-"; } });
        statusBar.innerHTML = `<span class="text-green-600">✅ 均分完成</span>`; btn.disabled = false; btn.innerText = "💾 儲存並同步至群組"; btn.classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-700', 'active:scale-[0.98]', 'shadow-md'); btn.classList.remove('bg-gray-200', 'text-gray-500');
      } 
      else if (mode === "EXACT") {
        let currentForeignSum = 0; document.querySelectorAll('.split-input').forEach(input => currentForeignSum += (parseFloat(input.value) || 0)); let diff = rawAmount - currentForeignSum;
        
        if (Math.abs(diff) < 0.1) { statusBar.innerHTML = `<span class="text-green-600">✅ 帳目平衡</span>`; btn.disabled = false; btn.innerText = "💾 儲存並同步至群組"; btn.classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-700', 'active:scale-[0.98]', 'shadow-md'); btn.classList.remove('bg-gray-200', 'text-gray-500'); } 
        else if (diff > 0) { statusBar.innerHTML = `<span class="text-blue-500">尚差 ${diff.toFixed(0)} ${currency}</span>`; btn.innerText = `🔒 尚差 ${diff.toFixed(0)}`; } 
        else { statusBar.innerHTML = `<span class="text-red-500">❌ 超出 ${Math.abs(diff).toFixed(0)} ${currency}</span>`; btn.innerText = `🔒 金額超出`; }
      }
      else if (mode === "SHARE" || mode === "PERCENT") {
        let totalMetric = 0; document.querySelectorAll('.split-input').forEach(input => totalMetric += (parseFloat(input.value) || 0));
        if (mode === "SHARE" && totalMetric <= 0) { statusBar.innerHTML = `<span class="text-red-500">❌ 總份數為 0</span>`; return; }
        
        if (mode === "PERCENT") {
            if (Math.abs(totalMetric - 100) > 0.01) { 
                statusBar.innerHTML = `<span class="text-blue-500">目前計 ${totalMetric}%</span>`; btn.innerText = `🔒 比例須等於 100%`; 
                if(totalMetric > 100) { statusBar.innerHTML = `<span class="text-red-500">❌ 超出 ${totalMetric}%</span>`; }
                return; 
            }
        }

        let calculatedSum = 0; let inputs = document.querySelectorAll('.split-input');
        inputs.forEach((input, idx) => { let val = parseFloat(input.value) || 0; let assigned = Math.floor(rawAmount * (val / totalMetric)); calculatedSum += assigned; if (idx === inputs.length - 1) assigned += (rawAmount - calculatedSum); const res = input.closest('div.flex.items-center.justify-between').querySelector('.live-result'); if(res) res.innerText = `${assigned.toLocaleString()}`; });
        statusBar.innerHTML = `<span class="text-green-600">✅ 換算完成</span>`; btn.disabled = false; btn.innerText = "💾 儲存並同步至群組"; btn.classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-700', 'active:scale-[0.98]', 'shadow-md'); btn.classList.remove('bg-gray-200', 'text-gray-500');
      }
    }

    async function submitRegistration() {
      const nameInput = document.getElementById('realNameInput').value.trim(); const btn = document.getElementById('registerBtn');
      if (!nameInput) { showToast("暱稱不可為空白", "error"); hapticVibrate([50, 50, 50]); return; } 
      btn.disabled = true; btn.innerText = "⏳ 註冊中..."; hapticVibrate(50);
      try { 
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: "registerUser", tripId: currentTripId, userId: currentUserProfile.userId, realName: nameInput }) }); 
        const result = await res.json(); 
        if (result.status === "success") { showToast("註冊成功！載入中...", "success"); setTimeout(()=> window.location.reload(), 800); }
        else throw new Error(result.message || "未知錯誤"); 
      } catch (e) { 
        showToast(e.message.includes("NameCollision") ? "名稱已被使用，請加上姓氏或數字" : "註冊失敗，請重試", "error"); 
        hapticVibrate([50, 50, 50]); btn.disabled = false; btn.innerText = "完成註冊並進入"; 
      }
    }

    async function initializeLiff() {
      const statusLight = document.getElementById('statusLight');
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) return liff.login();

        const urlParams = new URLSearchParams(window.location.search);
        currentTripId = urlParams.get('tripId') || "null"; currentGroupId = liff.getContext()?.groupId || "ONLINE_TEST"; currentUserProfile = await liff.getProfile();

        const payload = { action: "initWeb", tripId: currentTripId, groupId: currentGroupId, userId: currentUserProfile.userId };
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();

        statusLight.classList.replace('bg-yellow-400', 'bg-green-500'); statusLight.classList.remove('animate-pulse');

        const renderTripCard = (t, statusClass, statusText) => `
          <div onclick="navigateToTrip('${t.id}')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md active:scale-[0.98] transition-all relative group overflow-hidden">
            <div class="absolute inset-0 bg-blue-50 opacity-0 group-active:opacity-100 transition-opacity"></div>
            <div class="relative z-10 flex justify-between items-start mb-2">
              <span class="font-bold text-lg text-gray-800 tracking-tight">${t.name}</span>
              <span class="text-[10px] ${statusClass} px-2.5 py-1 rounded-full font-bold shadow-sm">${statusText}</span>
            </div>
            <div class="relative z-10 text-xs text-gray-400 mb-3 font-mono tracking-tight">${t.dateRange}</div>
            <div class="relative z-10 flex space-x-4 text-xs font-bold text-gray-500 border-t border-gray-50 pt-3 mt-2">
              <span class="flex items-center">👥 <span class="ml-1 font-mono">${t.memberCount}</span> 人</span>
              <span class="flex items-center">📝 <span class="ml-1 font-mono">${t.expenseCount}</span> 筆帳目</span>
            </div>
          </div>
        `;

        if (result.status === "dashboard") {
          document.getElementById('tripNameDisplay').innerText = `總控台 (Hi, ${result.suggestedName || currentUserProfile.displayName})`;
          bottomBar.classList.add('btn-hidden'); appContainer.style.height = '100%';
          
          document.getElementById('dashboardActive').innerHTML = result.activeTrips.length === 0 ? `<p class="text-sm text-gray-400 text-center py-6">目前無進行中的旅程</p>` : result.activeTrips.map(t => renderTripCard(t, "bg-green-50 text-green-600 border border-green-100", "記錄中")).join('');
          document.getElementById('dashboardArchived').innerHTML = result.archivedTrips.length === 0 ? `<p class="text-sm text-gray-400 text-center py-6">無歷史封存記錄</p>` : result.archivedTrips.map(t => renderTripCard(t, "bg-gray-100 text-gray-500 border border-gray-200", "歷史封存")).join('');
          
          document.getElementById('view-dashboard').style.display = 'flex'; return;
        }

        if (result.status === "success") {
          if (!result.isRegistered) { 
            if(result.suggestedName) document.getElementById('realNameInput').value = result.suggestedName; 
            document.querySelector('#registrationModal p').innerText = "系統偵測到您是初次使用，請設定群組內可辨識的暱稱（限 6 個字以內）。";
            document.getElementById('registrationModal').classList.remove('hidden'); return; 
          }
          IS_ARCHIVED = (result.tripStatus === 'ARCHIVED');
          RATE_MATRIX = result.rateMatrix; 
          GLOBAL_FEE_RATE = result.feeRate || 0; 
          CURRENT_RATE = RATE_MATRIX[result.defaultCurrency] || 1.0;
          MEMBER_LIST = result.members || []; ALL_EXPENSES = result.expenses || []; 

          const payerSel = document.getElementById('payerSelect');
          payerSel.innerHTML = MEMBER_LIST.map(m => `<option value="${m}">${m}</option>`).join('');
          if (result.suggestedName && MEMBER_LIST.includes(result.suggestedName)) { payerSel.value = result.suggestedName; }
          
          const curSelect = document.getElementById('currencySelect');
          curSelect.innerHTML = Object.keys(RATE_MATRIX).map(c => `<option value="${c}">${c}</option>`).join('');
          curSelect.value = result.defaultCurrency; 

          document.getElementById('rateDisplay').innerText = `(1 : ${CURRENT_RATE} TWD)`;
          document.getElementById('tripNameDisplay').innerHTML =
            `${IS_ARCHIVED ? '📦' : '✈️'} ${result.tripName}
             <span class="text-[11px] text-gray-400 font-normal ml-1">
               ${result.startDate} ~ ${result.endDate}
             </span>`;
          
          document.getElementById('tabContainer').style.display = 'flex';
          initHistoryFilters(); renderSplitDetailAdd(); 
          
          if (IS_ARCHIVED) { document.getElementById('tab-add').style.display = 'none'; switchTab('history'); } 
          else { switchTab('add'); }
        } else throw new Error(result.message || "連線失敗");
      } catch (err) { statusLight.classList.replace('bg-yellow-400', 'bg-red-500'); statusLight.classList.remove('animate-pulse'); showToast("系統阻斷：" + err.message, "error"); hapticVibrate([50, 50, 50]); }
    }

    async function submitExpense() {
      if (IS_ARCHIVED) { showToast("已封存旅程無法新增帳目", "error"); hapticVibrate([50, 50, 50]); return; }
      hapticVibrate(50);
      const btn = document.getElementById('submitBtn'); const desc = document.getElementById('descInput').value.trim(); const rawAmount = parseFloat(document.getElementById('amountInput').value); const currency = document.getElementById('currencySelect').value; const splitMode = document.getElementById('splitModeSelect').value;
      const selectedPayerName = document.getElementById('payerSelect').value;
      const totalTwd = Math.round(rawAmount * CURRENT_RATE * (1 + GLOBAL_FEE_RATE)); let splitDetailObj = {};
      
      if (splitMode === "EQUAL") { const checkboxes = document.querySelectorAll('.split-checkbox:checked'); let base = Math.floor(totalTwd / checkboxes.length); let residue = totalTwd - (base * checkboxes.length); checkboxes.forEach((cb, idx) => { let name = cb.getAttribute('data-name'); splitDetailObj[name] = base + (idx === checkboxes.length - 1 ? residue : 0); }); } 
      else if (splitMode === "EXACT") { const inputs = document.querySelectorAll('.split-input'); inputs.forEach(input => { let val = parseFloat(input.value) || 0; let name = input.getAttribute('data-name'); splitDetailObj[name] = Math.round(val * CURRENT_RATE * (1 + GLOBAL_FEE_RATE)); }); let calculatedTwdSum = Object.values(splitDetailObj).reduce((a, b) => a + b, 0); let residue = totalTwd - calculatedTwdSum; const lastPerson = Array.from(inputs).pop().getAttribute('data-name'); if(residue !== 0) splitDetailObj[lastPerson] += residue; } 
      else if (splitMode === "SHARE" || splitMode === "PERCENT") { const inputs = document.querySelectorAll('.split-input'); let totalMetric = 0, metricMap = {}; inputs.forEach(input => { let val = parseFloat(input.value) || 0; let name = input.getAttribute('data-name'); metricMap[name] = val; totalMetric += val; }); let calculatedSum = 0; MEMBER_LIST.forEach(name => { splitDetailObj[name] = Math.round(totalTwd * (metricMap[name] / totalMetric)); calculatedSum += splitDetailObj[name]; }); let residue = totalTwd - calculatedSum; if(residue !== 0 && MEMBER_LIST.length > 0) splitDetailObj[MEMBER_LIST[MEMBER_LIST.length - 1]] += residue; }

      btn.disabled = true; btn.innerText = "⏳ 儲存此筆交易中...";
      try {
        const payload = { action: "addExpense", tripId: currentTripId, groupId: currentGroupId, payerUserId: currentUserProfile.userId, payerName: selectedPayerName, description: desc, rawAmount: rawAmount, currency: currency, exchangeRate: CURRENT_RATE, splitMode: splitMode, splitDetailString: JSON.stringify(splitDetailObj) };
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) }); const result = await res.json();
        if (result.status === "success") {
          showToast("儲存成功！", "success");
          
          // V20.4 記帳通知語義化 (動態計算原外幣金額)
          let detailText = ""; const rows = document.getElementById('splitDetailContainer').children;
          Array.from(rows).forEach(row => { 
            let name = row.querySelector('span.font-medium').innerText; let val = 0;
            if (splitMode === "EXACT") { val = parseFloat(row.querySelector('.split-input').value) || 0; } 
            else { 
              let resSpan = row.querySelector('.live-result'); 
              if(resSpan && resSpan.innerText && resSpan.innerText !== "-") { val = parseFloat(resSpan.innerText.replace(/[^\d.-]/g, '')); } 
            }
            if(val > 0) detailText += `\n  • ${name}: ${val.toLocaleString()} ${currency}`; 
          });
          
          const notifyMsg = `📝 ${currentUserProfile.displayName} 記了一筆帳\n\n📌 項目：${desc || "未命名消費"}\n💰 總額：${rawAmount.toLocaleString()} ${currency} (由 ${selectedPayerName} 付)\n\n--- 分攤明細 ---${detailText}`;
          await liff.sendMessages([{ type: 'text', text: notifyMsg }]);
          setTimeout(() => liff.closeWindow(), 1000);
        } else throw new Error();
      } catch (err) { showToast("網路通訊錯誤，請重試", "error"); hapticVibrate([50, 50, 50]); btn.disabled = false; btn.innerText = "💾 儲存並同步至群組"; }
    }

    document.addEventListener('click', function(e) {
      const btn = e.target.closest('.split-mode-btn');
      if(!btn) return;
      hapticVibrate(20);
      document.querySelectorAll('.split-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('splitModeSelect').value = btn.dataset.mode;
      renderSplitDetailAdd();
      calculateLivePreview();
    });

    initializeLiff();
  </script>
</body>
