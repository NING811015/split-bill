<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>極速記帳</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-24">

  <div class="bg-white shadow-sm p-4 sticky top-0 z-10">
    <h1 class="text-lg font-bold text-gray-800" id="tripNameDisplay">讀取旅程中...</h1>
    <p class="text-xs text-gray-400" id="statusLog">正在連線至加密資料庫</p>
  </div>

  <div class="p-4 space-y-4" id="mainForm" style="display: none;">
    
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">消費項目</label>
      <input type="text" id="descInput" placeholder="例：橋村炸雞" class="w-full bg-white border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>

    <div class="flex space-x-2">
      <div class="w-2/3">
        <label class="block text-sm font-medium text-gray-600 mb-1">金額 (外幣)</label>
        <input type="text" id="amountInput" inputmode="decimal" pattern="[0-9]*" placeholder="0" class="w-full text-xl bg-white border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div class="w-1/3">
        <label class="block text-sm font-medium text-gray-600 mb-1">幣別</label>
        <select id="currencySelect" class="w-full bg-white border border-gray-200 rounded-lg p-3 focus:outline-none">
          <option value="KRW">KRW</option>
          <option value="JPY">JPY</option>
          <option value="VND">VND</option>
          <option value="TWD">TWD</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">當前匯率 (外幣轉台幣)</label>
      <input type="text" id="rateInput" inputmode="decimal" value="1.0" class="w-full bg-gray-100 border border-gray-200 rounded-lg p-3 focus:outline-none">
    </div>

  </div>

  <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 shadow-lg">
    <button id="submitBtn" onclick="submitExpense()" class="w-full bg-blue-500 text-white font-bold text-lg rounded-xl py-3 shadow-sm active:bg-blue-600 disabled:bg-gray-300 transition-colors">
      💾 儲存並同步至群組
    </button>
  </div>

  <script>
    // ==========================================
    // 參數配置區
    // ==========================================
    const MY_LIFF_ID = "2010297900-38V2U0d0";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_KjMuAXfyZcRcjIJAGDrsxsg8n1KA7ROv_NeiGtzuOtjnvHMEIxAtTzMmCFECwVY/exec";
    
    let currentTripId = null;
    let currentUserProfile = null;
    let currentGroupId = null;

    // 建立本地端匯率常數矩陣 (Local Rate Matrix)
    const RATE_MATRIX = {
      "TWD": 1.0,
      "KRW": 0.024,
      "JPY": 0.22,
      "VND": 0.0013
    };

    // 核心物理掛載：監聽幣別選單切換
    document.getElementById('currencySelect').addEventListener('change', function(e) {
      const selectedCurrency = e.target.value;
      document.getElementById('rateInput').value = RATE_MATRIX[selectedCurrency] || 1.0;
    });

    // ==========================================
    // LIFF 初始化與後端動態拉取
    // ==========================================
    async function initializeLiff() {
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) return liff.login();

        const urlParams = new URLSearchParams(window.location.search);
        currentTripId = urlParams.get('tripId');
        
        const context = liff.getContext();
        currentGroupId = context.groupId;
        currentUserProfile = await liff.getProfile();

        if (!currentTripId || !currentGroupId) throw new Error("查無旅程 ID 或不在群組內。");

        const statusLog = document.getElementById('statusLog');
        statusLog.innerText = "⏳ 正在同步雲端最新匯率...";

        try {
          const payload = { action: "initWeb", tripId: currentTripId, groupId: currentGroupId, userId: currentUserProfile.userId };
          const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
          const result = await res.json();

          if (result.status === "success") {
            RATE_MATRIX[result.currency] = result.rate; // 覆寫矩陣
            document.getElementById('currencySelect').value = result.currency; // 切換下拉選單
            document.getElementById('rateInput').value = result.rate; // 填入匯率
            
            document.getElementById('tripNameDisplay').innerText = `記一筆消費 [${result.tripName}]`;
            statusLog.innerText = "✅ 雲端匯率同步完成";
          } else {
            throw new Error("API回傳失敗");
          }
        } catch (fetchErr) {
          statusLog.innerText = "⚠️ 匯率同步失敗，已切換至離線預設矩陣";
          statusLog.className = "text-xs text-yellow-600 font-bold";
        }

        document.getElementById('mainForm').style.display = 'block';

      } catch (err) {
        document.getElementById('statusLog').innerText = "❌ 系統阻斷：" + err.message;
        document.getElementById('statusLog').className = "text-xs text-red-500 font-bold";
      }
    }

    // 核心提交與通知邏輯
    async function submitExpense() {
      const btn = document.getElementById('submitBtn');
      const desc = document.getElementById('descInput').value;
      const amount = document.getElementById('amountInput').value;
      const currency = document.getElementById('currencySelect').value;
      const rate = document.getElementById('rateInput').value;

      if(!desc || !amount) return alert("請輸入項目與金額");

      btn.disabled = true;
      btn.innerText = "⏳ 寫入資料庫中...";

      const payload = {
        action: "addExpense", tripId: currentTripId, groupId: currentGroupId,
        payerUserId: currentUserProfile.userId, description: desc,
        rawAmount: parseFloat(amount), currency: currency, exchangeRate: parseFloat(rate),
        splitMode: "EQUAL", splitDetailString: "{}"
      };

      try {
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "success") {
          await liff.sendMessages([{ type: 'text', text: `📝 ${currentUserProfile.displayName} 已記帳：${desc} $${amount} ${currency}` }]);
          liff.closeWindow();
        } else throw new Error("寫入失敗");
      } catch (err) {
        alert("網路錯誤，請重新儲存。");
        btn.disabled = false;
        btn.innerText = "💾 重試儲存";
      }
    }

    initializeLiff();
  </script>
</body>
</html>
