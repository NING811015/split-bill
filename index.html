<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>極速記帳 V6 完全體</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    html, body { height: 100%; overflow: hidden; }
    .scroll-container { height: 100%; overflow-y: auto; padding-bottom: 90px; }
    .btn-hidden { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans relative">

  <div id="registrationModal" class="absolute inset-0 z-[100] bg-gray-900 bg-opacity-95 flex flex-col justify-center items-center p-6 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center space-y-4">
      <div class="text-4xl">👋</div>
      <h2 class="text-xl font-bold text-gray-800">歡迎加入旅程</h2>
      <p class="text-sm text-gray-500">系統偵測到您是初次使用，請設定您在記帳本中顯示的真實姓名（限 6 個字以內）。</p>
      <input type="text" id="realNameInput" maxlength="6" placeholder="請輸入姓名" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button id="registerBtn" onclick="submitRegistration()" class="w-full bg-blue-600 text-white font-bold rounded-xl py-3 active:bg-blue-700">完成註冊並進入</button>
    </div>
  </div>

  <div class="scroll-container" id="scrollArea">
    <div class="bg-white shadow-sm p-4 sticky top-0 z-10">
      <h1 class="text-lg font-bold text-gray-800" id="tripNameDisplay">讀取旅程中...</h1>
      <p class="text-xs text-gray-400" id="statusLog">正在連線至加密資料庫</p>
    </div>

    <div class="p-4 space-y-4" id="mainForm" style="display: none;">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">消費項目</label>
        <input type="text" id="descInput" placeholder="例：橋村炸雞" class="w-full bg-white border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div class="flex space-x-2">
        <div class="w-2/3">
          <label class="block text-sm font-medium text-gray-600 mb-1">金額 (外幣)</label>
          <input type="text" id="amountInput" inputmode="decimal" pattern="[0-9]*" placeholder="0" class="w-full text-xl bg-white border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div class="w-1/3">
          <label class="block text-sm font-medium text-gray-600 mb-1">幣別</label>
          <select id="currencySelect" class="w-full bg-white border border-gray-200 rounded-lg p-3 focus:outline-none border-gray-200">
            <option value="KRW">KRW</option>
            <option value="JPY">JPY</option>
            <option value="VND">VND</option>
            <option value="TWD">TWD</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">當前匯率 (外幣轉台幣)</label>
        <input type="text" id="rateInput" inputmode="decimal" value="1.0" class="w-full bg-gray-100 border border-gray-200 rounded-lg p-3 focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">分帳模式</label>
        <select id="splitModeSelect" class="w-full bg-white border border-gray-200 rounded-lg p-3 focus:outline-none border-gray-200">
          <option value="EQUAL">👥 均分 (可剔除成員)</option>
          <option value="EXACT">🎯 指定金額 (跟隨上方幣別)</option>
          <option value="SHARE">⚖️ 人頭份數 (SHARE)</option>
          <option value="PERCENT">📈 比例分配 (PERCENT - %)</option>
        </select>
      </div>

      <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm space-y-3">
        <h3 class="text-sm font-bold text-gray-700 border-b border-gray-100 pb-2 flex justify-between">
          <span>分帳細節明細</span>
          <span id="currencyHint" class="text-xs text-blue-500 font-normal"></span>
        </h3>
        <div id="splitDetailContainer" class="space-y-3 max-h-60 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <div id="bottomBar" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-50">
    <button id="submitBtn" onclick="submitExpense()" class="w-full bg-blue-500 text-white font-bold text-lg rounded-xl py-3 shadow-sm active:bg-blue-600 disabled:bg-gray-300 transition-colors">
      💾 儲存並同步至群組
    </button>
  </div>

  <script>
    const MY_LIFF_ID = "2010297900-38V2U0d0";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_KjMuAXfyZcRcjIJAGDrsxsg8n1KA7ROv_NeiGtzuOtjnvHMEIxAtTzMmCFECwVY/exec";
    
    let currentTripId = null, currentUserProfile = null, currentGroupId = null;
    const RATE_MATRIX = { "TWD": 1.0, "KRW": 0.024, "JPY": 0.22, "VND": 0.0013 };
    let MEMBER_LIST = []; // 完全放棄離線預設，強制由雲端接管

    const bottomBar = document.getElementById('bottomBar');
    document.addEventListener('focusin', (e) => { if (e.target.tagName === 'INPUT') bottomBar.classList.add('btn-hidden'); });
    document.addEventListener('focusout', (e) => {
      setTimeout(() => { if(document.activeElement.tagName !== 'INPUT') bottomBar.classList.remove('btn-hidden'); }, 100);
    });

    document.getElementById('currencySelect').addEventListener('change', function(e) {
      document.getElementById('rateInput').value = RATE_MATRIX[e.target.value] || 1.0;
      renderSplitDetail(); 
    });
    document.getElementById('splitModeSelect').addEventListener('change', renderSplitDetail);

    function renderSplitDetail() {
      const mode = document.getElementById('splitModeSelect').value;
      const currency = document.getElementById('currencySelect').value;
      const container = document.getElementById('splitDetailContainer');
      const hint = document.getElementById('currencyHint');
      container.innerHTML = "";

      if (mode === "EXACT") hint.innerText = `輸入單位: ${currency}`;
      else if (mode === "PERCENT") hint.innerText = `加總須為 100%`;
      else hint.innerText = "";

      if (MEMBER_LIST.length === 0) {
        container.innerHTML = `<p class="text-xs text-red-500 py-2">⚠️ 無成員資料，請重新載入網頁。</p>`;
        return;
      }

      MEMBER_LIST.forEach(name => {
        const row = document.createElement('div');
        row.className = "flex items-center justify-between space-x-4 bg-gray-50 p-2 rounded-lg";
        let inputHtml = "";
        
        if (mode === "EQUAL") inputHtml = `<input type="checkbox" data-name="${name}" class="split-checkbox w-5 h-5 text-blue-600 rounded border-gray-300" checked>`;
        else if (mode === "EXACT") inputHtml = `<div class="flex items-center"><input type="text" data-name="${name}" inputmode="decimal" placeholder="0" class="split-input w-24 text-right bg-white border border-gray-200 rounded p-1 text-sm focus:outline-none"><span class="text-xs text-gray-500 ml-1">${currency}</span></div>`;
        else if (mode === "SHARE") inputHtml = `<div class="flex items-center"><input type="text" data-name="${name}" inputmode="decimal" value="1" class="split-input w-16 text-center bg-white border border-gray-200 rounded p-1 text-sm focus:outline-none"><span class="text-xs text-gray-400 ml-1">份</span></div>`;
        else if (mode === "PERCENT") inputHtml = `<div class="flex items-center"><input type="text" data-name="${name}" inputmode="decimal" placeholder="0" class="split-input w-16 text-right bg-white border border-gray-200 rounded p-1 text-sm focus:outline-none"><span class="text-xs text-gray-400 ml-1">%</span></div>`;

        row.innerHTML = `<span class="text-sm font-medium text-gray-700">${name}</span>${inputHtml}`;
        container.appendChild(row);
      });
    }

    // 新增：註冊行為提交
    async function submitRegistration() {
      const nameInput = document.getElementById('realNameInput').value.trim();
      const btn = document.getElementById('registerBtn');
      if (!nameInput) return alert("姓名不可為空");
      
      btn.disabled = true;
      btn.innerText = "⏳ 註冊中...";

      try {
        const payload = { action: "registerUser", tripId: currentTripId, userId: currentUserProfile.userId, realName: nameInput };
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "success") {
           // 註冊成功，重新刷新頁面以載入完整名單
           window.location.reload();
        } else throw new Error();
      } catch (e) {
        alert("註冊失敗，請重試");
        btn.disabled = false;
        btn.innerText = "完成註冊並進入";
      }
    }

    async function initializeLiff() {
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) return liff.login();

        const urlParams = new URLSearchParams(window.location.search);
        currentTripId = urlParams.get('tripId');
        currentGroupId = liff.getContext().groupId || "ONLINE_TEST";
        currentUserProfile = await liff.getProfile();

        if (!currentTripId) throw new Error("查無旅程變數 ID。");

        const statusLog = document.getElementById('statusLog');
        const payload = { action: "initWeb", tripId: currentTripId, groupId: currentGroupId, userId: currentUserProfile.userId };
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();

        if (result.status === "success") {
          // 生命週期攔截器：未註冊者強制彈出註冊窗
          if (!result.isRegistered) {
             document.getElementById('registrationModal').classList.remove('hidden');
             return; // 中斷渲染，鎖死畫面
          }

          RATE_MATRIX[result.currency] = result.rate;
          document.getElementById('currencySelect').value = result.currency;
          document.getElementById('rateInput').value = result.rate;
          document.getElementById('tripNameDisplay').innerText = `記一筆消費 [${result.tripName}]`;
          MEMBER_LIST = result.members || [];
          
          statusLog.innerText = "✅ 雲端數據同步完成";
          renderSplitDetail(); 
          document.getElementById('mainForm').style.display = 'block';
        } else throw new Error("後端拒絕連線");

      } catch (err) {
        document.getElementById('statusLog').innerText = "❌ 系統阻斷：" + err.message;
        document.getElementById('statusLog').className = "text-xs text-red-500 font-bold";
      }
    }

    async function submitExpense() {
      const btn = document.getElementById('submitBtn');
      const desc = document.getElementById('descInput').value.trim();
      const rawAmount = parseFloat(document.getElementById('amountInput').value);
      const currency = document.getElementById('currencySelect').value;
      const exchangeRate = parseFloat(document.getElementById('rateInput').value);
      const splitMode = document.getElementById('splitModeSelect').value;

      if (!desc || isNaN(rawAmount) || rawAmount <= 0) return alert("請輸入正確的項目與金額");

      const totalTwd = Math.round(rawAmount * exchangeRate);
      let splitDetailObj = {};
      
      if (splitMode === "EQUAL") {
        const checkboxes = document.querySelectorAll('.split-checkbox:checked');
        if (checkboxes.length === 0) return alert("❌ 請至少選擇一位成員");
        let base = Math.floor(totalTwd / checkboxes.length);
        let residue = totalTwd - (base * checkboxes.length);
        checkboxes.forEach((cb, idx) => {
          let name = cb.getAttribute('data-name');
          splitDetailObj[name] = base + (idx === checkboxes.length - 1 ? residue : 0);
        });
      } 
      else if (splitMode === "EXACT") {
        const inputs = document.querySelectorAll('.split-input');
        let currentForeignSum = 0;
        inputs.forEach(input => {
          let val = parseFloat(input.value) || 0;
          let name = input.getAttribute('data-name');
          currentForeignSum += val;
          splitDetailObj[name] = Math.round(val * exchangeRate);
        });
        if (Math.abs(currentForeignSum - rawAmount) > 0.1) return alert(`❌ 金額不守恆：分配總和不等於消費總額`);
        
        let calculatedTwdSum = Object.values(splitDetailObj).reduce((a, b) => a + b, 0);
        let residue = totalTwd - calculatedTwdSum;
        const lastPerson = Array.from(inputs).pop().getAttribute('data-name');
        if(residue !== 0) splitDetailObj[lastPerson] += residue;
      } 
      else if (splitMode === "SHARE" || splitMode === "PERCENT") {
        const inputs = document.querySelectorAll('.split-input');
        let totalMetric = 0, metricMap = {};
        inputs.forEach(input => {
          let val = parseFloat(input.value) || 0;
          let name = input.getAttribute('data-name');
          metricMap[name] = val; totalMetric += val;
        });

        if (splitMode === "SHARE" && totalMetric <= 0) return alert("❌ 總份數不可為 0");
        if (splitMode === "PERCENT" && Math.abs(totalMetric - 100) > 0.01) return alert(`❌ 比例錯誤：必須等於 100%`);

        let calculatedSum = 0;
        MEMBER_LIST.forEach(name => {
          splitDetailObj[name] = Math.round(totalTwd * (metricMap[name] / totalMetric));
          calculatedSum += splitDetailObj[name];
        });
        let residue = totalTwd - calculatedSum;
        if(residue !== 0 && MEMBER_LIST.length > 0) splitDetailObj[MEMBER_LIST[MEMBER_LIST.length - 1]] += residue;
      }

      btn.disabled = true;
      btn.innerText = "⏳ 寫入雲端矩陣中...";

      const payload = {
        action: "addExpense", tripId: currentTripId, groupId: currentGroupId,
        payerUserId: currentUserProfile.userId, description: desc,
        rawAmount: rawAmount, currency: currency, exchangeRate: exchangeRate,
        splitMode: splitMode, splitDetailString: JSON.stringify(splitDetailObj) 
      };

      try {
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "success") {
          await liff.sendMessages([{ type: 'text', text: `📝 記帳成功：${desc} $${rawAmount} ${currency}` }]);
          liff.closeWindow();
        } else throw new Error();
      } catch (err) {
        alert("網路通訊錯誤，請重試。");
        btn.disabled = false;
        btn.innerText = "💾 重試儲存";
      }
    }

    initializeLiff();
  </script>
</body>
</html>
